<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Search Users | EduPlatform</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
	<link th:href="@{/css/student-style/student_sidebar.css}" rel="stylesheet">

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
		}

		body {
			background: #f4f7ff;
		}

		.main {
			margin-left: 240px;
			margin-top: 56px;
			padding: 20px;
			transition: margin-left 0.3s ease;
		}

		.sidebar.collapsed~.main {
			margin-left: 80px;
		}

		html,
		body {
			height: 100%;
		}

		.sidebar {
			height: 100%;
			position: fixed;
			left: 0;
			top: 0;
		}


		.search-box {
			display: flex;
			align-items: center;
			gap: 10px;
			background: white;
			padding: 16px;
			border-radius: 14px;
			border: 1px solid #e5e7eb;
			margin-bottom: 20px;
			box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
		}

		.search-box input {
			border: none;
			outline: none;
			width: 100%;
			font-size: 14px;
		}

		.hint {
			font-size: 13px;
			color: #6b7280;
			margin-bottom: 20px;
		}

		/* CARD */
		.user-card {
			background: white;
			padding: 16px;
			border-radius: 16px;
			display: flex;
			align-items: center;
			gap: 15px;
			margin-bottom: 14px;
			border: 1px solid #eee;
			transition: 0.25s;
		}

		.user-card:hover {
			transform: translateY(-3px);
			box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
		}

		.user-card img {
			width: 55px;
			height: 55px;
			border-radius: 50%;
			object-fit: cover;
		}

		.user-info {
			flex: 1;
		}

		.user-name {
			font-weight: 600;
			font-size: 15px;
		}

		.badge {
			font-size: 11px;
			padding: 2px 8px;
			border-radius: 999px;
			margin-left: 8px;
		}

		.student-badge {
			background: #ede9fe;
			color: #6d28d9;
		}

		.teacher-badge {
			background: #dbeafe;
			color: #2563eb;
		}

		/* BUTTON GROUP */
		.actions {
			display: flex;
			gap: 8px;
		}

		.btn {
			border: none;
			padding: 7px 14px;
			border-radius: 10px;
			font-size: 13px;
			cursor: pointer;
			display: flex;
			align-items: center;
			gap: 5px;
			transition: 0.2s;
		}

		.btn:hover {
			transform: translateY(-2px);
		}

		.btn-connect {
			background: #6d28d9;
			color: white;
		}

		.btn-chat {
			background: #10b981;
			color: white;
		}

		.btn-profile {
			background: #2563eb;
			color: white;
		}

		.status-text {
			font-size: 13px;
		}

		.pending {
			color: #f59e0b;
		}

		.received {
			color: #2563eb;
		}

		.empty {
			text-align: center;
			padding: 40px;
			color: #6b7280;
		}
	</style>
</head>

<body>

	<div class="sidebar collapsed" id="sidebar">
		<button class="toggle-btn" id="toggle">
			<i class="bi bi-chevron-right"></i>
		</button>

		<div class="sidebar-brand">
			<a href="/student-dashboard">
				<img th:src="@{/images/logo.png}" class="platform-logo" alt="Logo">
			</a>
			<h2 class="platform-name">
				EduPlatform
			</h2>
		</div>

		<a th:href="@{/student-dashboard}"><i class="bi bi-speedometer2"></i><span>Dashboard</span></a>
		<a th:href="@{/student-course}"><i class="bi bi-search"></i><span>Explore Courses</span></a>
		<a th:href="@{/student-learning}"><i class="bi bi-book-half"></i><span>My Learning</span></a>
		<a th:href="@{/student-feedback}"><i class="bi bi-person-video3"></i><span>Instructor Overview</span></a>
		<a th:href="@{/student-stuff}"><i class="bi bi-graph-up"></i><span>Classroom</span></a>
		<a th:href="@{/student-chat}"><i class="bi bi-chat"></i><span>Doubts Chat</span></a>
		<a th:href="@{/student-internships}"><i class="bi bi-briefcase"></i><span>Internships</span></a>
		<a th:href="@{/student-search}" class="active"><i class="bi bi-search"></i><span>Search Users</span></a>
		<a th:href="@{/student-profile}"><i class="bi bi-person-circle"></i><span>Profile</span></a>
		<a th:href="@{/student-login}"><i class="bi bi-box-arrow-right"></i><span>Logout</span></a>

	</div>
	<div class="student-topbar">
		<span class="page-title">Student Profile</span>
		<div class="topbar-right">
			<div class="notif">
				<a th:href="@{/student-notification}">
					<i class="bi bi-bell"></i>
					<span class="dot"></span> </a>
			</div>
			<div class="profile">
				<a th:href="@{/student-profile}" class="profile-link">

					<img th:src="${loggedStudent != null and loggedStudent.profileImage != null
                ? loggedStudent.profileImage
                : '/images/default.jpg'}" alt="Profile">

					<span class="student-name" th:text="${loggedStudent != null ? loggedStudent.fullname : 'Student'}">
						Student
					</span>

				</a>
			</div>
		</div>
	</div>
	<div class="main">

		<!-- SEARCH -->
		<div class="search-box">
			<i class="bi bi-search"></i>
			<input type="text" id="searchInput" placeholder="Search students or teachers...">
		</div>

		<div class="hint">
			Search students to connect 🤝 or teachers to view & chat 🎓
		</div>

		<div id="resultsContainer">

			<div th:each="r : ${results}" class="user-card">

				<img th:src="${r.image != null ? r.image : '/images/default.jpg'}">

				<div class="user-info">
					<div class="user-name">
						<span th:text="${r.name}"></span>

						<span th:if="${r.type == 'STUDENT'}" class="badge student-badge">
							Student
						</span>

						<span th:if="${r.type == 'TEACHER'}" class="badge teacher-badge">
							Teacher
						</span>
					</div>
				</div>
				<div class="actions">

					<div th:if="${r.type == 'TEACHER'}" style="display:flex; gap:8px;">

						<a th:href="@{/student-teacher-view(id=${r.refId})}" class="btn btn-profile">
							<i class="bi bi-person"></i>
						</a>

						<a th:href="@{/student-chat(userId=${r.id})}" class="btn btn-chat">
							<i class="bi bi-chat-dots"></i>
						</a>

					</div>
					<div th:if="${r.type == 'STUDENT'}">

						<form th:if="${r.status == 'FOLLOW'}" action="/connection/send" method="post">
							<input type="hidden" name="receiverId" th:value="${r.id}">
							<button class="btn btn-connect">
								<i class="bi bi-person-plus"></i> Connect
							</button>
						</form>

						<span th:if="${r.status == 'PENDING'}" class="status-text pending">
							⏳ Request Sent
						</span>

						<a th:if="${r.status == 'REQUEST_RECEIVED'}" th:href="@{/student-notification}"
							class="status-text received">
							Accept Request
						</a>

						<a th:if="${r.status == 'CHAT'}" th:href="@{/student-chat(userId=${r.id})}"
							class="btn btn-chat">
							<i class="bi bi-chat"></i> Chat
						</a>

					</div>
				</div>
			</div>

			<div th:if="${#lists.isEmpty(results)}" class="empty">
				No users found 😕
			</div>

		</div>
	</div>

	<script>
		const input = document.getElementById("searchInput");
		const container = document.getElementById("resultsContainer");

		let timeout = null;

		input.addEventListener("input", () => {
			clearTimeout(timeout);

			timeout = setTimeout(() => {
				fetch(`/student-search-ajax?keyword=${input.value}`)
					.then(res => res.json())
					.then(data => render(data));
			}, 300);
		});

		function render(users) {
			container.innerHTML = "";

			if (users.length === 0) {
				container.innerHTML = "<div class='empty-box'>No users found</div>";
				return;
			}

			users.forEach(u => {
				let action = "";

				if (u.status === "FOLLOW") {
					action = `
                        <form method="post" action="/connection/send">
                            <input type="hidden" name="receiverId" value="${u.id}">
                            <button class="btn-connect">Connect</button>
                        </form>`;
				}

				if (u.status === "PENDING") {
					action = `<span class="pending">Request Sent ✓</span>`;
				}

				if (u.status === "REQUEST_RECEIVED") {
					action = `<a href="/student-notification" class="received">Accept</a>`;
				}

				if (u.status === "CHAT") {
					action = `<a href="/student-chat?userId=${u.id}" class="btn-chat">Chat</a>`;
				}

				container.innerHTML += `
                    <div class="user-card">
                        <img src="${u.image || '/images/default.jpg'}">
                        <div style="flex:1;">
                            <div class="user-name">
                                ${u.name}
                                <span class="user-type">${u.type}</span>
                            </div>
                        </div>
                        ${action}
                    </div>
                `;
			});
		}
	</script>
</body>

</html>
