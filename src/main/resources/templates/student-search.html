<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Search | EduPlatform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link th:href="@{/css/student-style/student_sidebar.css}" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: #f4f7ff;
        }

        .main {
            margin-left: 240px;
            margin-top: 56px;
            padding: 20px;
            transition: margin-left 0.3s ease;
        }

        .sidebar.collapsed~.main {
            margin-left: 80px;
        }



        html,
        body {
            height: 100%;
        }

        .sidebar {
            height: 100%;
            position: fixed;
            left: 0;
            top: 0;
        }
    </style>
</head>

<body>

    <div class="sidebar collapsed" id="sidebar">
        <button class="toggle-btn" id="toggle">
            <i class="bi bi-chevron-right"></i>
        </button>

        <div class="sidebar-brand">
            <a href="/student-dashboard">
                <img th:src="@{/images/logo.png}" class="platform-logo" alt="Logo">
            </a>
            <h2 class="platform-name">
                EduPlatform
            </h2>
        </div>

        <a th:href="@{/student-dashboard}"><i class="bi bi-speedometer2"></i><span>Dashboard</span></a>
        <a th:href="@{/student-course}"><i class="bi bi-search"></i><span>Explore Courses</span></a>
        <a th:href="@{/student-learning}"><i class="bi bi-book-half"></i><span>My Learning</span></a>
        <a th:href="@{/student-feedback}"><i class="bi bi-person-video3"></i><span>Instructor Overview</span></a>
        <a th:href="@{/student-stuff}"><i class="bi bi-graph-up"></i><span>Classroom</span></a>
        <a th:href="@{/student-chat}"><i class="bi bi-chat"></i><span>Doubts Chat</span></a>
        <a th:href="@{/student-internships}"><i class="bi bi-briefcase"></i><span>Internships</span></a>
        <a th:href="@{/student-search}" class="active"><i class="bi bi-search"></i><span>Search Users</span></a>
        <a th:href="@{/student-profile}"><i class="bi bi-person-circle"></i><span>Profile</span></a>
        <a th:href="@{/student-login}"><i class="bi bi-box-arrow-right"></i><span>Logout</span></a>

    </div>
    <div class="student-topbar">
        <span class="page-title">Student Profile</span>
        <div class="topbar-right">
            <div class="notif">
                <a th:href="@{/student-notification}">
                    <i class="bi bi-bell"></i>
                    <span class="dot"></span> </a>
            </div>
            <div class="profile">
                <a th:href="@{/student-profile}" class="profile-link">

                    <img th:src="${loggedStudent != null and loggedStudent.profileImage != null
                ? loggedStudent.profileImage
                : '/images/default.jpg'}" alt="Profile">

                    <span class="student-name" th:text="${loggedStudent != null ? loggedStudent.fullname : 'Student'}">
                        Student
                    </span>

                </a>
            </div>
        </div>
    </div>
    <div class="main">

        <!-- 🔍 SEARCH BAR -->
        <form method="GET" action="/student-search" style="margin-bottom:20px;">
            <div style="display:flex; gap:10px;">
                <input type="text" name="keyword" placeholder="Search students, teachers..."
                    style="flex:1; padding:10px 15px; border-radius:10px; border:1px solid #ddd;">

                <button style="padding:10px 18px; border:none; border-radius:10px; background:#6d28d9; color:#fff;">
                    Search
                </button>
            </div>
        </form>

        <!-- 👥 RESULTS -->
        <div th:if="${results == null or #lists.isEmpty(results)}" style="text-align:center; opacity:0.6;">
            No users found
        </div>

        <div th:each="r : ${results}" class="conversation"
            style="background:#fff; margin-bottom:12px; border-radius:12px; padding:14px; display:flex; gap:12px; align-items:center;">

            <img th:src="${r.image != null ? r.image : '/images/default.jpg'}"
                style="width:50px; height:50px; border-radius:50%;">

            <div style="flex:1;">
                <div style="font-weight:600;">
                    <span th:text="${r.name}"></span>

                    <span style="font-size:12px; color:#6d28d9; margin-left:6px;" th:text="${r.type}"></span>
                </div>

               <div style="margin-top:6px;">

    <!-- FOLLOW -->
    <form th:if="${r.status == 'FOLLOW'}" action="/connection/send" method="post">
        <input type="hidden" name="receiverId" th:value="${r.id}">
        <button class="btn btn-sm btn-primary">Connect</button>
    </form>

    <!-- PENDING -->
    <span th:if="${r.status == 'PENDING'}"
          style="color:#f59e0b; font-size:13px;">
        Request Sent
    </span>

    <!-- RECEIVED -->
    <a th:if="${r.status == 'REQUEST_RECEIVED'}"
       th:href="@{/student-notification}"
       style="color:#2563eb; font-size:13px;">
        Accept Request
    </a>

    <!-- CHAT -->
    <a th:if="${r.status == 'CHAT'}"
       th:href="@{/student-chat(userId=${r.id})}"
       class="btn btn-sm btn-success">
        Chat
    </a>

</div>
            </div>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById("sidebar");
        const toggle = document.getElementById("toggle");
        const icon = toggle.querySelector("i");

        toggle.addEventListener("click", () => {
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle("mobile-show");
            } else {
                sidebar.classList.toggle("collapsed");
                icon.classList.toggle("bi-chevron-right");
                icon.classList.toggle("bi-chevron-left");
            }
        });
    </script>

</body>

</html>
