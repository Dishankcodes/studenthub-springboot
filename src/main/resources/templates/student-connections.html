<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Connections</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", system-ui, sans-serif;
        }

        body {
            background: #f4f7ff;
            padding: 30px 40px;
        }

        /* FULL PAGE CARD */
        .connections-card {
            background: #ffffff;
            border-radius: 18px;
            padding: 30px;
            width: 100%;
            min-height: 100vh;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
        }

        .count {
            color: #6b7280;
            font-size: 14px;
            margin-top: 4px;
        }

        .back-btn {
            text-decoration: none;
            background: #eef2ff;
            padding: 8px 14px;
            border-radius: 10px;
            color: #4f46e5;
            font-weight: 500;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: #e0e7ff;
        }

        .connection-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-radius: 14px;
            transition: 0.25s;
            margin-bottom: 10px;
        }

        .connection-item:hover {
            background: #f8faff;
            transform: translateY(-2px);
        }

        .left {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
        }

        .left img {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #e6ebff;
        }

        .name {
            font-weight: 600;
            font-size: 15px;
        }

        .type {
            font-size: 12px;
            color: #6b7280;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .msg-btn {
            background: #4f46e5;
            color: white;
        }

        .msg-btn:hover {
            background: #4338ca;
        }

        .remove-btn {
            background: #f1f5f9;
            color: #ef4444;
        }

        .remove-btn:hover {
            background: #fee2e2;
        }

        .empty {
            text-align: center;
            color: gray;
            padding: 40px;
        }

        @media (max-width: 768px) {

            body {
                padding: 14px;
            }

            .connections-card {
                padding: 18px;
                border-radius: 14px;
            }

            .top-bar {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .title {
                font-size: 20px;
            }

            .count {
                font-size: 13px;
            }

            .back-btn {
                width: 100%;
                text-align: center;
                padding: 10px;
            }

            .connection-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                padding: 14px;
            }

            .left {
                width: 100%;
            }

            .left img {
                width: 48px;
                height: 48px;
            }

            .name {
                font-size: 14px;
            }

            .type {
                font-size: 11px;
            }

            .actions {
                width: 100%;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .btn {
                width: 100%;
                justify-content: center;
                font-size: 13px;
                padding: 10px;
            }

            .empty {
                padding: 30px 10px;
                font-size: 14px;
            }
        }

        .connection-item {
            border: 1px solid #eef1f7;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #eef1f7;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.04);
        }

        .search-box input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 14px;
        }

        .search-box i {
            color: #6366f1;
        }
    </style>
</head>

<body>

    <div class="connections-card">

        <div class="top-bar">
            <div>
                <div class="title">
                    <i class="bi bi-people-fill"></i> Connections
                </div>
                <div class="count">
                    <span th:text="${#lists.size(connections)}"></span> connections
                </div>
            </div>

            <a href="/student-profile" class="back-btn">
                <i class="bi bi-arrow-left"></i> Profile
            </a>
        </div>
        <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" id="searchInput" placeholder="Search connections...">
        </div>

        <div th:if="${#lists.isEmpty(connections)}" class="empty">
            <i class="bi bi-person-x"></i> No connections yet
        </div>

        <div th:each="c : ${connections}" class="connection-item" th:attr="data-name=${nameMap[c.id]}">

            <div class="left" th:onclick="'window.location.href=\'/student-view-profile?userId=' + ${c.id} + '\''">

                <img th:src="${imageMap[c.id] != null ? imageMap[c.id] : '/images/default.jpg'}">

                <div>
                    <div class="name" th:text="${nameMap[c.id]}"></div>
                    <div class="type" th:text="${c.type}"></div>
                </div>
            </div>

            <div class="actions">

                <button class="btn msg-btn"
                    th:onclick="'window.location.href=\'/student-chat?userId=' + ${c.id} + '\''">
                    <i class="bi bi-chat-dots-fill"></i> Message
                </button>

                <form th:action="@{/connection/remove}" method="post">
                    <input type="hidden" name="userId" th:value="${c.id}" />
                    <button type="submit" class="btn remove-btn" onclick="return confirm('Remove this connection?')">
                        <i class="bi bi-person-dash-fill"></i> Remove
                    </button>
                </form>
            </div>
        </div>
        <div id="noResults" class="empty" style="display:none;">
            <i class="bi bi-search"></i><br>
            No friends found <i class="bi bi-people"></i>
        </div>
    </div>
    <script>
        const searchInput = document.getElementById("searchInput");
        const cards = document.querySelectorAll(".connection-item");
        const empty = document.getElementById("noResults");

        searchInput.addEventListener("keyup", () => {

            const value = searchInput.value.toLowerCase();
            let visible = 0;

            cards.forEach(card => {

                const name = card.getAttribute("data-name")?.toLowerCase() || "";

                if (name.includes(value)) {
                    card.style.display = "flex";
                    visible++;
                } else {
                    card.style.display = "none";
                }

            });

            // 🔥 EMPTY STATE
            if (visible === 0) {
                empty.style.display = "block";
            } else {
                empty.style.display = "none";
            }

        });
    </script>
</body>

</html>
