<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Student Profile | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/admin-css/admin_sidebar.css}" rel="stylesheet">

    <style>
        /* ===== THEME ===== */

        body {
            background: linear-gradient(135deg, #0b0b1f, #14142f);
            font-family: 'Poppins', sans-serif;
            color: #e5e7eb;
        }

        /* ===== CONTENT ===== */

        .content-area {
            padding: 25px;
        }

        /* ===== CARD ===== */

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(14px);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* ===== PROFILE ===== */

        .profile {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .profile img {
            width: 85px;
            height: 85px;
            border-radius: 50%;
        }

        /* ===== INFO GRID ===== */

        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 14px;
            border-radius: 12px;
        }

        .info-box span {
            font-size: 11px;
            color: #9ca3af;
        }

        .info-box p {
            margin: 5px 0 0;
        }

        p {
            margin: 10px;
        }

        /* ===== FULL BOX ===== */

        .full-box {
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 14px;
            border-radius: 12px;
        }

        /* ===== STATUS ===== */

        .status {
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 12px;
        }

        .pending {
            background: #f59e0b33;
            color: #f59e0b;
        }

        .accepted {
            background: #22c55e33;
            color: #22c55e;
        }

        .rejected {
            background: #ef444433;
            color: #ef4444;
        }

        /* ===== BUTTONS ===== */

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 14px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-success {
            background: #22c55e;
        }

        .btn-danger {
            background: #ef4444;
        }

        .btn-primary {
            background: #6366f1;
        }

        /* ===== TOPBAR ===== */

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .back {
            background: rgba(255, 255, 255, 0.08);
            padding: 8px 14px;
            border-radius: 10px;
            color: white;
            text-decoration: none;
        }

        /* ===== GLOBAL MOBILE ===== */
        @media (max-width: 768px) {

            .content-area {
                padding: 18px 14px;
            }

            .card {
                padding: 16px;
                border-radius: 14px;
            }

            h2 {
                font-size: 18px;
            }
        }

        /* ===== PROFILE MOBILE ===== */
        @media (max-width: 768px) {

            .profile {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .profile img {
                width: 70px;
                height: 70px;
            }

            .profile h2 {
                font-size: 16px;
            }

            .profile p {
                font-size: 13px;
            }
        }

        /* ===== INFO GRID ===== */
        @media (max-width: 768px) {

            .info-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .info-box {
                padding: 12px;
            }

            .info-box p {
                font-size: 13px;
            }
        }

        /* ===== FULL BOX ===== */
        @media (max-width: 768px) {

            .full-box {
                font-size: 13px;
                padding: 12px;
            }
        }

        /* ===== TOPBAR ===== */
        @media (max-width: 768px) {

            .topbar {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .back {
                width: 100%;
                text-align: center;
            }
        }

        /* ===== BUTTONS ===== */
        @media (max-width: 768px) {

            .actions {
                flex-direction: column;
                gap: 8px;
            }

            .actions form {
                width: 100%;
            }

            .btn {
                width: 100%;
                justify-content: center;
                font-size: 12px;
            }
        }

        /* ===== APPLICATION ===== */
        @media (max-width: 768px) {

            .card p {
                font-size: 13px;
                margin: 8px 0;
            }

            .status {
                font-size: 11px;
            }
        }

        /* ===== SMALL MOBILE ===== */
        @media (max-width: 576px) {

            body {
                overflow-x: hidden;
            }

            .card {
                margin-bottom: 14px;
            }

            .profile h2 {
                font-size: 15px;
            }

            .info-box span {
                font-size: 10px;
            }

            .btn {
                padding: 10px;
                font-size: 11px;
            }
        }
        a.btn {
    text-decoration: none !important;
}
    </style>
</head>

<body>

    <main class="home-section">
        <div class="content-area">

            <!-- HEADER -->
            <div class="topbar">
                <h2>👤 Student Profile</h2>

                <a th:href="@{'/admin-applicants?id=' + ${internship.id}}" class="back">
                    ← Back
                </a>
            </div>

            <div class="card">

                <!-- PROFILE -->
                <div class="profile">
                    <img th:src="${student.profileImage != null ? student.profileImage : '/images/default.jpg'}">

                    <div style="display:flex; flex-direction:column; gap:6px;">

                        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">

                            <h2 th:text="${student.fullname}" style="margin:0;"></h2>

                            <!-- 🔥 FULL DASHBOARD BUTTON -->
                            <a th:href="@{/admin-student-dashboard(id=${student.studid})}" class="btn btn-primary"
                                style="font-size:12px; padding:6px 10px;">
                                <i class="bi bi-speedometer2"></i> Full Dashboard
                            </a>

                        </div>

                        <p th:text="${student.email}" style="color:#9ca3af; margin:0;"></p>

                    </div>
                </div>

                <!-- INFO -->
                <div class="info-grid">
                    <div class="info-box">
                        <span>FULL NAME</span>
                        <p th:text="${student.fullname}"></p>
                    </div>

                    <div class="info-box">
                        <span>COLLEGE</span>
                        <p th:text="${student.college}"></p>
                    </div>

                    <div class="info-box">
                        <span>DEGREE</span>
                        <p th:text="${student.degree}"></p>
                    </div>
                </div>

                <div class="full-box">
                    <span>INTERESTS</span>
                    <p th:text="${student.interests != null ? student.interests : 'No interests added'}"></p>
                </div>

                <!-- APPLICATION -->
                <div th:if="${app != null}">

                    <hr style="opacity:0.2;margin:20px 0;">

                    <p>Internship: <span th:text="${internship.title}"></span></p>
                    <p>Phone: <span th:text="${app.phone}"></span></p>

                    <p>Status:
                        <span class="status" th:classappend="
                ${app.status.name() == 'APPLIED'} ? ' pending' :
                (${app.status.name() == 'ACCEPTED'} ? ' accepted' :
                (${app.status.name() == 'REJECTED'} ? ' rejected' : ''))" th:text="${app.status}">
                        </span>
                    </p>

                    <p>Cover Letter:</p>
                    <p th:text="${app.coverLetter}"></p>

                    <div class="actions" th:if="${app.status.name() == 'APPLIED'}">

                        <form th:action="@{/admin/application/update}" method="post">
                            <input type="hidden" name="appId" th:value="${app.id}">
                            <input type="hidden" name="internshipId" th:value="${internship.id}">

                            <button name="action" value="accept" class="btn btn-success">
                                <i class="bi bi-check-circle"></i> Accept
                            </button>

                            <button name="action" value="reject" class="btn btn-danger">
                                <i class="bi bi-x-circle"></i> Reject
                            </button>
                        </form>

                        <form th:action="@{/admin/select-student}" method="post">
                            <input type="hidden" name="studentId" th:value="${student.studid}">
                            <input type="hidden" name="internshipId" th:value="${internship.id}">

                            <button class="btn btn-primary">
                                <i class="bi bi-person-check"></i> Select
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
