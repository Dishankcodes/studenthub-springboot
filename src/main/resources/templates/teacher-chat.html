<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Chat/Support System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/teacher-css/teacher-sidebar.css}">
    <link href="teacher-sidebar.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #f4f6f9;
            color: #1f1f2e;
        }

        .main-content {
            margin-left: 260px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: margin-left 0.3s ease;
        }

        body.sidebar-collapsed .main-content {
            margin-left: 80px;
        }

        .page-title {
            font-size: 26px;
            font-weight: 600;
        }

        .top-bar {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin: 25px 0;
        }

        .chat-container {
            display: flex;
            height: 100%;
            overflow: hidden;
        }

        .chat-bar {
            width: 260px;
            background: #fff;
            border-right: 1px solid #e5e7eb;
            overflow-y: auto;
            height: 100%;
        }

        .conversation {
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #e5e7eb;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .conversation:hover {
            background: #f3f4f6;
        }

        .conversation.active {
            background: #6d28d9;
            color: white;
        }

        .conversation img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        .info {
            flex: 1;
        }

        .info .name {
            font-weight: 600;
        }

        .info .preview {
            font-size: 0.85rem;
            color: gray;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #e5ddd5;
            position: relative;
            height: 100%;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 60%;
            padding: 10px 15px;
            border-radius: 15px;
            position: relative;
            word-wrap: break-word;
        }

        .message.sent {
            background: #dcf8c6;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .message.received {
            background: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        .timestamp {
            font-size: 0.7rem;
            color: gray;
            margin-top: 3px;
            text-align: right;
        }

        .chat-input {
            display: flex;
            border-top: 1px solid #ccc;
            padding: 10px;
            background: #fff;
        }

        .chat-input input {
            flex: 1;
            border-radius: 20px;
            padding: 10px 15px;
            border: 1px solid #ccc;
        }

        .chat-input button {
            border-radius: 50%;
            width: 38px;
            height: 38px;
            background: #6d28d9;
            color: white;
            border: none;
            margin-left: 10px;
        }

        #searchUser {
            width: 90%;
            margin: 10px auto;
            display: block;
            padding: 8px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            outline: none;
            background-color: #fff;
            color: #374151;
            transition: all 0.2s ease;
        }

        #searchUser:focus {
            border-color: #6d28d9;
            box-shadow: 0 0 4px rgba(109, 40, 217, 0.3);
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 15px;
            background-color: #fff;
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 10;
            flex-shrink: 0;
        }

        .chat-header img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header-info {
            display: flex;
            flex-direction: column;
        }

        .chat-name {
            font-weight: 600;
            color: #111827;
        }

        .chat-status {
            font-size: 0.8rem;
            color: gray;
        }


        .unread-badge {
            display: inline-flex;
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: #ef4444;
            color: #fff;
            font-size: 11px;
            align-items: center;
            justify-content: center;
        }

        .conversation .time {
            color: gray;
            margin-left: auto;
            white-space: nowrap;
        }

        .chat-header {
            flex-shrink: 0;
        }

        .chat-input {
            flex-shrink: 0;
        }
    </style>
</head>

<body class="sidebar-collapsed">

    <aside class="sidebar collapsed">
        <div class="sidebar-logo">
            <img th:src="@{/images/logo.png}">
            <span class="logo-text">EduPlatform</span>
        </div>

        <nav class="sidebar-menu">
            <a th:href="@{/teacher-dashboard}"><i class="bi bi-speedometer2"></i><span> Dashboard </span></a>
            <a th:href="@{/teacher-course}"><i class="bi bi-journal-text"></i><span>Course
                    Management</span></a>
            <a th:href="@{/teacher-creates-course}"><i class="bi bi-journal-plus"></i><span>Create Course</span></a>
            <a th:href="@{/teacher-activity}"><i class="bi bi-pencil-square"></i><span>Genereal Activities</span></a>
            <a th:href="@{/teacher-students}"><i class="bi bi-people"></i><span>Students</span></a>
            <a th:href="@{/teacher-chat}" class="active"><i class="bi bi-chat-dots"></i><span>Communication</span></a>
            <a th:href="@{/teacher-feedback}"><i class="bi bi-star"></i><span>Feedback & Ratings</span></a>
            <a th:href="@{/teacher-profile}"><i class="bi bi-gear"></i><span>Profile</span></a>
            <a th:href="@{/logout}" class="logout"><i class="bi bi-box-arrow-right"></i><span>Logout</span></a>
        </nav>
    </aside>

    <main class="main-content">

        <header class="top-header">
            <div class="header-left">
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="bi bi-list"></i>
                </button>

                <span class="page-title">Chat System </span>
            </div>
            <div class="header-right">
                <div class="profile-trigger" id="profileToggle">
                    <span th:text="${teacher.firstname + ' ' + teacher.lastname}">
                        Dishank
                    </span>
                    <div class="avatar">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    <i class="bi bi-caret-down-fill"></i>
                </div>
                <div class="profile-dropdown" id="profileDropdown">
                    <a th:href="@{/teacher-profile}">Profile</a>
                    <a href="@{/logout}">Logout</a>
                </div>
            </div>
        </header>

        <hr class="header-divider">


        <div class="chat-container">
            <div class="chat-bar" id="chatBar">
                <input type="text" id="searchUser" placeholder="🔍 Search users...">
                <div th:each="user : ${users}" class="conversation">

                    <a th:href="@{/teacher-chat(userId=${user.id})}"
                        style="display:flex; gap:10px; text-decoration:none; color:inherit; width:100%;">

                        <img th:src="${user.profileImage != null ? user.profileImage : '/images/default.jpg'}">

                        <div class="info">
                            <div class="name" th:text="${user.name}"></div>
                        </div>

                    </a>
                </div>

            </div>

            <div class="chat-window">

                <div th:if="${selectedUser != null}" class="chat-header">
                    <img
                        th:src="${selectedUser.profileImage != null ? selectedUser.profileImage : '/images/default.jpg'}">

                    <div class="chat-header-info">
                        <div class="chat-name" th:text="${selectedUser.name}"></div>
                        <div class="chat-status">Student</div>
                    </div>
                </div>

                <div th:if="${selectedUser == null}" class="chat-header">
                    <div class="chat-name">Select a user to start chatting</div>
                </div>

                <div class="messages">

                    <div th:if="${messages == null or #lists.isEmpty(messages)}"
                        style="text-align:center; opacity:0.6;">
                        No messages yet
                    </div>

                    <div th:each="msg : ${messages}"
                        th:class="'message ' + (${msg.sender.id} == ${session.chatUserId} ? 'sent' : 'received')}">

                        <span th:text="${msg.content}"></span>

                        <div class="timestamp" th:text="${#temporals.format(msg.timestamp, 'HH:mm')}"></div>
                    </div>

                </div>

                <form th:if="${roomId != null}" method="POST" action="/chat/send" class="chat-input">

                    <input type="hidden" name="roomId" th:value="${roomId}">
                    <input type="text" name="content" placeholder="Type a message..." required>

                    <button type="submit">
                        <i class="bi bi-send"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        const toggleBtn = document.getElementById("sidebarToggle");
        const sidebar = document.querySelector(".sidebar");
        const body = document.body;

        toggleBtn.addEventListener("click", () => {
            sidebar.classList.toggle("collapsed");
            body.classList.toggle("sidebar-collapsed");
        });
    </script>

    <script>

        // Search filter
        document.getElementById('searchUser').addEventListener('keyup', function () {
            const filter = this.value.toLowerCase();
            document.querySelectorAll('.conversation').forEach(user => {
                const name = user.querySelector('.info .name').textContent.toLowerCase();
                const preview = user.querySelector('.info .preview').textContent.toLowerCase();
                user.style.display = (name.includes(filter) || preview.includes(filter)) ? 'flex' : 'none';
            });
        });
    </script>
    <script>
        function sendMessage() {
            const input = document.getElementById("messageInput");
            const text = input.value.trim();

            if (!text) return;

            const msgBox = document.getElementById("messages");

            const msg = document.createElement("div");
            msg.className = "message sent";
            msg.innerHTML = `
        ${text}
        <div class="timestamp">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
    `;

            msgBox.appendChild(msg);

            input.value = "";
            msgBox.scrollTop = msgBox.scrollHeight;
        }
    </script>
</body>

</html>
