<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Student Dashboard | EduPlatform</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
	<link th:href="@{/css/student-style/student_sidebar.css}" rel="stylesheet">

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
		}

		html,
		body {
			height: 100%;
			overflow: hidden;
		}

		body {
			background: #fff;
			line-height: 1.6;
		}

		.main {
			margin-left: 240px;
			margin-top: 56px;
			height: calc(100vh - 56px);
			padding: 0;
			display: flex;
			flex-direction: column;
		}

		.chat-container {
			display: flex;
			height: 100%;
			overflow: hidden;
		}

		.chat-bar {
			width: 260px;
			background: #fff;
			border-right: 1px solid #e5e7eb;
			overflow-y: auto;
			height: 100%;
		}

		.conversation {
			padding: 10px;
			display: flex;
			align-items: center;
			gap: 10px;
			border-bottom: 1px solid var(--sidebar-border);
			cursor: pointer;
			text-decoration: none;
			color: inherit;
		}

		.conversation:hover {
			background: #f3f4f6;
		}

		.conversation.active {
			background: #6d28d9;
			color: white;
		}

		.conversation img {
			width: 45px;
			height: 45px;
			border-radius: 50%;
			object-fit: cover;
		}

		.info {
			flex: 1;
		}

		.info .name {
			font-weight: 600;
		}

		.info .preview {
			font-size: 0.85rem;
			color: gray;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.chat-window {
			flex: 1;
			display: flex;
			flex-direction: column;
			background: #e5ddd5;
			position: relative;
		}

		.messages {
			flex: 1;
			overflow-y: auto;
			padding: 15px;
			display: flex;
			flex-direction: column;
		}

		.message {
			max-width: 60%;
			padding: 10px 15px;
			border-radius: 15px;
			position: relative;
			word-wrap: break-word;
		}

		.message.sent {
			background: #dcf8c6;
			align-self: flex-end;
			border-bottom-right-radius: 0;
		}

		.message.received {
			background: #fff;
			align-self: flex-start;
			border-bottom-left-radius: 0;
		}

		.timestamp {
			font-size: 0.7rem;
			color: gray;
			margin-top: 3px;
			text-align: right;
		}

		.chat-input {
			display: flex;
			border-top: 1px solid #ccc;
			padding: 10px;
			background: #fff;
		}

		.chat-input input {
			flex: 1;
			border-radius: 20px;
			padding: 10px 15px;
			border: 1px solid #ccc;
		}

		.chat-input button {
			border-radius: 50%;
			width: 38px;
			height: 38px;
			background: #6d28d9;
			color: white;
			border: none;
			margin-left: 10px;
		}

		#searchUser {
			width: 90%;
			margin: 10px auto;
			display: block;
			padding: 8px 12px;
			border: 1px solid #e5e7eb;
			border-radius: 8px;
			outline: none;
			background-color: #fff;
			color: #374151;
			transition: all 0.2s ease;
		}

		#searchUser:focus {
			border-color: #6d28d9;
			box-shadow: 0 0 4px rgba(109, 40, 217, 0.3);
		}

		.chat-header {
			display: flex;
			align-items: center;
			gap: 12px;
			padding: 10px 15px;
			background-color: #fff;
			border-bottom: 1px solid #e5e7eb;
			position: sticky;
			top: 0;
			z-index: 10;
			flex-shrink: 0;
		}

		.chat-header img {
			width: 42px;
			height: 42px;
			border-radius: 50%;
			object-fit: cover;
		}

		.chat-header-info {
			display: flex;
			flex-direction: column;
		}

		.chat-name {
			font-weight: 600;
			color: #111827;
		}

		.chat-status {
			font-size: 0.8rem;
			color: gray;
		}


		.unread-badge {
			display: inline-flex;
			min-width: 18px;
			height: 18px;
			padding: 0 6px;
			border-radius: 999px;
			background: #ef4444;
			color: #fff;
			font-size: 11px;
			align-items: center;
			justify-content: center;
		}

		.conversation .time {
			color: gray;
			margin-left: auto;
			white-space: nowrap;
		}
	</style>
</head>

<body>

	<!-- ===== SIDEBAR ===== -->
	<div class="sidebar collapsed" id="sidebar">
		<button class="toggle-btn" id="toggle">
			<i class="bi bi-chevron-right"></i>
		</button>

		<div class="sidebar-brand">
			<a href="/student-dashboard">
				<img th:src="@{/images/logo.png}" class="platform-logo" alt="Logo">
			</a>
			<h2 class="platform-name">
				EduPlatform
			</h2>
		</div>

		<a th:href="@{/student-dashboard}"><i class="bi bi-speedometer2"></i><span>Dashboard</span></a>
		<a th:href="@{/student-course}"><i class="bi bi-search"></i><span>Explore Courses</span></a>
		<a th:href="@{/student-learning}"><i class="bi bi-book-half"></i><span>My Learning</span></a>
		<a th:href="@{/student-feedback}"><i class="bi bi-person-video3"></i><span>Instructor Overview</span></a>
		<a th:href="@{/student-stuff}"><i class="bi bi-graph-up"></i><span>Classroom</span></a>
		<a th:href="@{/student-chat}" class="active"><i class="bi bi-chat"></i><span>Doubts Chat</span></a>
		<a th:href="@{/student-internships}"><i class="bi bi-briefcase"></i><span>Internships</span></a>
		<a th:href="@{/student-search}"><i class="bi bi-search"></i><span>Search Users</span></a>
		<a th:href="@{/student-profile}"><i class="bi bi-person-circle"></i><span>Profile</span></a>
		<a th:href="@{/student-login}"><i class="bi bi-box-arrow-right"></i><span>Logout</span></a>

	</div>

	<!-- ===== TOPBAR ===== -->
	<div class="student-topbar">
		<span class="page-title">Chat System</span>
		<div class="topbar-right">
			<div class="notif">
				<a th:href="@{/student-notification}">
					<i class="bi bi-bell"></i>
					<span class="dot"></span> </a>
			</div>

			<div class="profile">
				<a th:href="@{/student-profile}" class="profile-link">

					<img th:src="${loggedStudent != null and loggedStudent.profileImage != null
                ? loggedStudent.profileImage
                : '/images/default.jpg'}" alt="Profile">

					<span class="student-name" th:text="${loggedStudent != null ? loggedStudent.fullname : 'Student'}">
						Student
					</span>

				</a>
			</div>
		</div>


	</div>

	<!-- Main Content -->
	<div class="main" id="main">

		<div class="chat-container">
			<div class="chat-bar" id="chatBar">
				<input type="text" id="searchUser" placeholder="🔍 Search users...">
				<div th:each="user : ${users}" class="conversation"
					th:classappend="${selectedUser != null and user.id == selectedUser.id} ? 'active'">

					<a th:href="@{/student-chat(userId=${user.id})}"
						style="display:flex; gap:10px; text-decoration:none; color:inherit; width:100%;">

						<img th:src="${imageMap[user.id] != null ? imageMap[user.id] : '/images/default.jpg'}">

						<div class="info">
							<div class="name">

								<span th:text="${nameMap[user.id] != null ? nameMap[user.id] : 'Unknown'}"></span>

								<!-- ICONS -->
								<i th:if="${user.type.name() == 'TEACHER'}" class="bi bi-person-badge"
									style="color:#6d28d9;"></i>

								<i th:if="${user.type.name() == 'STUDENT'}" class="bi bi-mortarboard"
									style="color:#2563eb;"></i>

								<i th:if="${user.type.name() == 'ADMIN'}" class="bi bi-shield-check"
									style="color:#ef4444;"></i>

								<!-- UNREAD -->
								<span class="unread-badge" th:if="${unreadMap[user.id] > 0}"
									th:text="${unreadMap[user.id]}"></span>



							</div>
							<div class="preview" th:text="${lastMessageMap[user.id]}">
							</div>
							<div class="time" th:text="${timeMap[user.id]}"></div>
						</div>
					</a>
				</div>
			</div>

			<div class="chat-window">
				<a th:if="${selectedUser != null}" th:href="@{/student-view-profile(userId=${selectedUser.id})}"
					class="chat-header" style="text-decoration:none; color:inherit; cursor:pointer;">
					<img th:src="${selectedImage != null ? selectedImage : '/images/default.jpg'}">

					<div class="chat-header-info">
						<div class="chat-name" th:text="${selectedName != null ? selectedName : 'Unknown'}"></div>

						<div class="chat-status">
							<span th:if="${canChat}">Online</span>
							<span th:if="${!canChat}">Follow to chat</span>
						</div>
					</div>

				</a>

				<div th:if="${selectedUser == null}" class="chat-header">
					<div class="chat-name">Select a user to start chatting</div>
				</div>

				<div class="messages" id="messages">

					<div th:if="${messages == null or #lists.isEmpty(messages)}"
						style="text-align:center; opacity:0.6;">
						No messages yet
					</div>

					<div th:each="msg : ${messages}"
						th:class="'message ' + (${msg.sender.id} == ${session.chatUserId} ? 'sent' : 'received')">

						<span th:text="${msg.content}"></span>

						<div class="timestamp" th:text="${#temporals.format(msg.timestamp, 'HH:mm')}"></div>
					</div>

				</div>

				<form th:if="${canChat}" method="POST" th:action="@{/student/send}" class="chat-input">

					<input type="hidden" name="roomId" th:value="${roomId}">

					<input type="text" name="content" placeholder="Type a message..." required>

					<button type="submit">
						<i class="bi bi-send"></i>
					</button>
				</form>

				<div th:if="${selectedUser != null and !canChat}" style="padding:15px; text-align:center;">

					<form action="/chat/follow" method="post">
						<input type="hidden" name="receiverId" th:value="${selectedUser.id}">
						<button class="btn btn-primary">
							Follow to Chat
						</button>
					</form>

				</div>
			</div>
		</div>

	</div>

	<script>
		const sidebar = document.getElementById("sidebar");
		const toggle = document.getElementById("toggle");
		const icon = toggle.querySelector("i");

		toggle.addEventListener("click", () => {
			if (window.innerWidth <= 768) {
				sidebar.classList.toggle("mobile-show");
			} else {
				sidebar.classList.toggle("collapsed");
				icon.classList.toggle("bi-chevron-right");
				icon.classList.toggle("bi-chevron-left");
			}
		});
	</script>

	<script>

		// Search filter
		document.getElementById('searchUser').addEventListener('keyup', function () {
			const filter = this.value.toLowerCase();
			document.querySelectorAll('.conversation').forEach(user => {
				const name = user.querySelector('.info .name').textContent.toLowerCase();
				const preview = user.querySelector('.info .preview').textContent.toLowerCase();
				user.style.display = (name.includes(filter) || preview.includes(filter)) ? 'flex' : 'none';
			});
		});
	</script>
	<script>
		function sendMessage() {
			const input = document.getElementById("messageInput");
			const text = input.value.trim();

			if (!text) return;

			const msgBox = document.getElementById("messages");

			const msg = document.createElement("div");
			msg.className = "message sent";
			msg.innerHTML = `
        ${text}
        <div class="timestamp">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
    `;

			msgBox.appendChild(msg);

			input.value = "";
			msgBox.scrollTop = msgBox.scrollHeight;
		}
	</script>

</body>

</html>
