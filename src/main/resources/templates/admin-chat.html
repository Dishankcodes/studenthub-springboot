<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Admin Chat</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
	
	<link th:href="@{/css/admin-css/admin_sidebar.css}" rel="stylesheet">
	<link href="admin-sidebar.css" rel="stylesheet">
	<style>
		html,
		body {
			height: 100%;
			overflow: hidden;
			background: #020617;
			color: #e5e7eb;
			font-family: 'Poppins', sans-serif;
		}

		.layout {
			display: flex;
			height: 100vh;
		}

		.content-area {
			flex: 1;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

		.home-section {
			flex: 1;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

		.main {
			flex: 1;
			display: flex;
			overflow: hidden;
		}

		.chat-container {
			display: flex;
			flex: 1;
			overflow: hidden;
		}

		.chat-bar {
			width: 260px;
			height: 100%;
			overflow-y: auto;
			background: #0f172a;
			border-right: 1px solid #1f2937;
		}

		#searchUser {
			width: 90%;
			margin: 12px auto;
			display: block;
			padding: 8px 12px;
			border-radius: 8px;
			border: 1px solid #374151;
			background: #1e293b;
			color: #e5e7eb;
		}

		#searchUser::placeholder {
			color: #9ca3af;
		}

		.conversation {
			padding: 10px;
			display: flex;
			align-items: center;
			gap: 10px;
			border-bottom: 1px solid #1f2937;
			cursor: pointer;
			text-decoration: none;
			color: #e5e7eb;
			transition: 0.2s;
		}

		.conversation:hover {
			background: #1e293b;
		}

		.conversation.active {
			background: linear-gradient(135deg, #6d28d9, #7c3aed);
		}

		.conversation img {
			width: 45px;
			height: 45px;
			border-radius: 50%;
			object-fit: cover;
		}

		.info {
			flex: 1;
		}

		.info .name {
			font-weight: 600;
		}

		.info .preview {
			font-size: 0.85rem;
			color: #9ca3af;
		}

		.unread-badge {
			background: #ef4444;
			color: white;
			font-size: 11px;
			padding: 2px 6px;
			border-radius: 999px;
		}

		.conversation .time {
			color: #9ca3af;
			margin-left: auto;
			font-size: 12px;
		}

		.chat-window {
			flex: 1;
			display: flex;
			flex-direction: column;
			height: 100%;
			background: #020617;
		}

		.chat-header {
			display: flex;
			align-items: center;
			gap: 12px;
			padding: 10px 15px;
			background: #0f172a;
			border-bottom: 1px solid #1f2937;
			flex-shrink: 0;
		}

		.chat-header img {
			width: 42px;
			height: 42px;
			border-radius: 50%;
		}

		.chat-name {
			font-weight: 600;
			color: #f9fafb;
		}

		.chat-status {
			font-size: 0.8rem;
			color: #9ca3af;
		}

		.messages {
			flex: 1;
			overflow-y: auto;
			padding: 15px;
			display: flex;
			flex-direction: column;
		}

		.message {
			max-width: 60%;
			padding: 10px 15px;
			border-radius: 15px;
			margin-bottom: 8px;
			word-wrap: break-word;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
		}

		.message.received {
			background: #1e293b;
			color: #e5e7eb;
			align-self: flex-start;
			border-bottom-left-radius: 0;
		}

		.message.sent {
			background: linear-gradient(135deg, #6d28d9, #7c3aed);
			color: white;
			align-self: flex-end;
			border-bottom-right-radius: 0;
		}

		.timestamp {
			font-size: 0.7rem;
			color: #9ca3af;
			margin-top: 3px;
			text-align: right;
		}

		.chat-input {
			display: flex;
			padding: 10px;
			background: #0f172a;
			border-top: 1px solid #1f2937;
			flex-shrink: 0;
		}

		.chat-input input {
			flex: 1;
			padding: 10px 15px;
			border-radius: 20px;
			border: none;
			background: #1e293b;
			color: #e5e7eb;
		}

		.chat-input input::placeholder {
			color: #9ca3af;
		}

		.chat-input button {
			width: 40px;
			height: 40px;
			margin-left: 10px;
			border-radius: 50%;
			border: none;
			background: linear-gradient(135deg, #6d28d9, #7c3aed);
			color: white;
			cursor: pointer;
			transition: 0.2s;
		}

		.chat-input button:hover {
			transform: scale(1.05);
		}
	</style>
</head>

<body>
	<div class="layout">

		<aside class="vertical-sidebar">
			<input type="checkbox" id="sidebar-toggle" class="checkbox-input" checked>
			<nav>
				<header>
					<div class="sidebar__toggle-container">
						<label for="sidebar-toggle" class="nav__toggle" tabindex="0">
							<span class="toggle--icons">
								<i class="bi bi-list toggle--open"></i><i class="bi bi-x-lg toggle--close"></i>
							</span>
						</label>
					</div>
					<figure>
						<img class="codepen-logo" th:src="@{/images/admin-avatar.png}" alt="Admin">
						<figcaption>
							<p class="user-id" th:text="${username}">Admin</p>
							<p class="user-role">Administrator</p>
						</figcaption>
					</figure>
				</header>

				<section class="sidebar__wrapper">
					<ul class="sidebar__list">
						<li class="sidebar__item item--heading">
							<h2 class="sidebar__item--heading">General</h2>
						</li>

						<li class="sidebar__item"><a th:href="@{/admin-dashboard}">
								<i class="bi bi-speedometer2"></i><span>Dashboard</span></a></li>
						<li class="sidebar__item"><a th:href="@{/manage-students}">
								<i class="bi bi-people"></i><span>Student Management</span></a></li>
						<li class="sidebar__item"><a th:href="@{/manage-teachers}">
								<i class="bi bi-person-badge"></i><span>Instructor Management</span></a></li>
						<li class="sidebar__item"><a th:href="@{/manage-courses}">
								<i class="bi bi-book"></i><span>Course Management</span></a></li>
						<li class="sidebar__item"><a th:href="@{/manage-internships}">
								<i class="bi bi-kanban"></i><span>Internship Management</span></a></li>
						<li class="sidebar__item"><a th:href="@{/admin-post-internships}">
								<i class="bi bi-plus-circle"></i><span>Post Internships </span></a></li>
						<li class="sidebar__item"><a th:href="@{/admin-chat}" class="active">
								<i class="bi bi-chat-dots"></i><span>Chat System</span></a></li>
						<li class="sidebar__item"><a th:href="@{/admin-announcement}">
								<i class="bi bi-briefcase"></i><span>Announcements</span></a></li>
						<li class="sidebar__item"><a th:href="@{/admin-design}"><i
									class="bi bi-layout-text-window"></i><span>Certificate Design</span></a></li>
						<li class="sidebar__item"><a th:href="@{/admin-feedback}">
								<i class="bi bi-bar-chart"></i><span>Feedback</span> </a></li>
						<li class="sidebar__item"><a th:href="@{/admin-settings}">
								<i class="bi bi-gear"></i><span>Settings</span></a></li>
						<li class="sidebar__item"><a th:href="@{/admin-logout}">
								<i class="bi bi-box-arrow-right"></i><span>Logout</span></a></li>

					</ul>
				</section>
			</nav>
		</aside>
		<div class="content-area">
			<header class="topbar">
				<span class="page-title"></span>
				<div class="topbar-right">
					<button class="profile-btn dropdown-toggle" data-bs-toggle="dropdown">
						<img th:src="@{/images/admin-avatar.png}" alt="Admin" class="avatar">
						<span th:text="${username}">Admin</span>
					</button>
				</div>
			</header>

			<main class="home-section">

				<div class="main" id="main">

					<div class="chat-container">
						<div class="chat-bar" id="chatBar">
							<input type="text" id="searchUser" placeholder="🔍 Search users...">
							<div th:each="user : ${users}" class="conversation">

								<a th:href="@{/admin-chat(userId=${user.id})}"
									style="display:flex; gap:10px; text-decoration:none; color:inherit; width:100%;">

									<img
										th:src="${imageMap[user.id] != null ? imageMap[user.id] : '/images/default.jpg'}">

									<div class="info">
										<div class="name">

											<span
												th:text="${nameMap[user.id] != null ? nameMap[user.id] : 'Unknown'}"></span>

											<!-- ICONS -->
											<i th:if="${user.type.name() == 'TEACHER'}" class="bi bi-person-badge"
												style="color:#6d28d9;"></i>

											<i th:if="${user.type.name() == 'STUDENT'}" class="bi bi-mortarboard"
												style="color:#2563eb;"></i>

											<i th:if="${user.type.name() == 'ADMIN'}" class="bi bi-shield-check"
												style="color:#ef4444;"></i>

											<!-- UNREAD -->
											<span class="unread-badge" th:if="${unreadMap[user.id] > 0}"
												th:text="${unreadMap[user.id]}"></span>

										</div>
										<div class="preview" th:text="${lastMessageMap[user.id]}">
										</div>
										<div class="time" th:text="${timeMap[user.id]}"></div>
									</div>
								</a>
							</div>
						</div>

						<div class="chat-window">

							<!-- HEADER -->
							<a th:if="${selectedUser != null}"
								th:href="@{/admin/view-profile(userId=${selectedUser.id})}" class="chat-header"
								style="text-decoration:none; color:inherit; cursor:pointer;">
								<img th:src="${selectedImage != null ? selectedImage : '/images/default.jpg'}">

								<div class="chat-header-info">
									<div class="chat-name" th:text="${selectedName != null ? selectedName : 'Unknown'}">
									</div>
									<div class="chat-status" th:text="${selectedUser.type}"></div>
								</div>
							</a>

							<div th:if="${selectedUser == null}" class="chat-header">
								<div class="chat-name">Select a user to start chatting</div>
							</div>

							<div class="messages">

								<div th:each="msg : ${messages}"
									th:class="'message ' + (${msg.sender.id == session.chatUserId} ? 'sent' : 'received')">

									<span th:text="${msg.content}"></span>

									<div class="timestamp" th:text="${#temporals.format(msg.timestamp, 'HH:mm')}"></div>
								</div>

							</div>

							<form th:if="${roomId != null}" method="POST" th:action="@{/admin/send}" class="chat-input">

								<input type="hidden" name="roomId" th:value="${roomId}">
								<input type="text" name="content" required>

								<button type="submit">
									<i class="bi bi-send"></i>
								</button>
							</form>

						</div>
					</div>
				</div>
			</main>
		</div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script>

	
		document.getElementById('searchUser').addEventListener('keyup', function () {
			const filter = this.value.toLowerCase();
			document.querySelectorAll('.conversation').forEach(user => {
				const name = user.querySelector('.info .name').textContent.toLowerCase();
				const preview = user.querySelector('.info .preview').textContent.toLowerCase();
				user.style.display = (name.includes(filter) || preview.includes(filter)) ? 'flex' : 'none';
			});
		});
	</script>
	<script>
		function sendMessage() {
			const input = document.getElementById("messageInput");
			const text = input.value.trim();

			if (!text) return;

			const msgBox = document.getElementById("messages");

			const msg = document.createElement("div");
			msg.className = "message sent";
			msg.innerHTML = `
        ${text}
        <div class="timestamp">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
    `;

			msgBox.appendChild(msg);

			input.value = "";
			msgBox.scrollTop = msgBox.scrollHeight;
		}
	</script>
</body>

</html>
