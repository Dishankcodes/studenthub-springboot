<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Internship Test Builder</title>

    <style>
        body {
            background: linear-gradient(135deg, #0b0b1f, #14142f);
            color: #fff;
            font-family: Poppins;
        }

        /* LAYOUT */
        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 16px;
            border-radius: 10px;
            text-decoration: none;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-main {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
        }

        .btn-success {
            background: #22c55e;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* CARD */
        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        /* INPUT */
        input,
        textarea,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        /* QUESTION */
        .question-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 8px;
        }

        .badge-mcq {
            background: #0ea5e9;
        }

        .badge-text {
            background: #f59e0b;
        }

        .badge-code {
            background: #22c55e;
        }
    </style>

</head>

<body>

    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <a th:href="@{/manage-internships}" class="btn btn-back">⬅ Back</a>
            <h2 th:text="${internship.title} + ' Test Builder'"></h2>
            <button class="btn btn-success">✅ Confirm Test</button>
        </div>

        <div class="grid">

            <!-- LEFT SIDE -->
            <div>

                <!-- TEST SETTINGS -->
                <div class="card">
                    <h3>⚙️ Test Settings</h3>

                    <form method="post" th:action="@{/admin/internship/test/update}">

                        <input type="hidden" name="internshipId" th:value="${internship.id}">

                        <label>Duration (minutes)</label>
                        <input type="number" name="duration" th:value="${test.durationMinutes}">

                        <label>Passing Marks</label>
                        <input type="number" name="passingMarks" th:value="${test.passingMarks}">

                        <label>Questions to Show</label>
                        <input type="number" name="totalQuestions" th:value="${test.totalQuestionsToShow}">

                        <br><br>
                        <button class="btn btn-main">Update Settings</button>
                    </form>
                </div>

                <!-- ADD QUESTION -->
                <div class="card">
                    <h3>➕ Add Question</h3>

                    <form th:action="@{/admin/internship/test/add-question}" method="post">

                        <input type="hidden" name="internshipId" th:value="${internship.id}">

                        <textarea name="questionText" placeholder="Enter question"></textarea>

                        <select name="format" onchange="toggleFields(this)">
                            <option value="MCQ">MCQ</option>
                            <option value="TEXT">Text</option>
                            <option value="CODE">Code</option>
                        </select>

                        <div class="mcq">
                            <input name="optionA" placeholder="Option A">
                            <input name="optionB" placeholder="Option B">
                            <input name="optionC" placeholder="Option C">
                            <input name="optionD" placeholder="Option D">

                            <select name="correctOption">
                                <option value="">Correct Option</option>
                                <option>A</option>
                                <option>B</option>
                                <option>C</option>
                                <option>D</option>
                            </select>
                        </div>

                        <br>
                        <button class="btn btn-main">Add Question</button>

                    </form>
                </div>

            </div>

            <!-- RIGHT SIDE -->
            <div>

                <!-- STATS -->
                <div class="card">
                    <h3>📊 Test Overview</h3>
                    <p>Total Questions: <b th:text="${#lists.size(questions)}"></b></p>
                    <p>Student will see: <b th:text="${test.totalQuestionsToShow}"></b></p>
                </div>

                <!-- QUESTIONS -->
                <div class="card">
                    <h3>📋 Questions</h3>

                    <div th:each="q : ${questions}" class="question-item">

                        <p th:text="${q.questionText}"></p>

                        <span class="badge" th:classappend="
                            ${q.questionFormat.name() == 'MCQ'} ? 'badge-mcq' :
                            (${q.questionFormat.name() == 'TEXT'} ? 'badge-text' : 'badge-code')
                          " th:text="${q.questionFormat}">
                        </span>

                        <br><br>

                        <a th:href="@{'/admin/internship/test/delete?questionId=' + ${q.questionId} + '&internshipId=' + ${internship.id}}"
                            class="btn btn-back">
                            Delete
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>
        function toggleFields(select) {
            let mcq = document.querySelector(".mcq");
            mcq.style.display = (select.value === "MCQ") ? "block" : "none";
        }
    </script>

</body>

</html>
