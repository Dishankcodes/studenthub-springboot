<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Internship Test Builder</title>

	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

	<style>
		:root {
			--bg: #0b0b1f;
			--card: rgba(255, 255, 255, 0.06);
			--border: rgba(255, 255, 255, 0.1);
			--primary: #6366f1;
			--secondary: #8b5cf6;
		}

		body {
			background: linear-gradient(135deg, #0b0b1f, #14142f);
			font-family: "Inter", sans-serif;
			color: #fff;
		}

		/* better spacing */
		.container {
			max-width: 1200px;
			margin: auto;
			padding: 30px
		}

		.card {
			background: var(--card);
			padding: 22px;
			border-radius: 16px;
			backdrop-filter: blur(12px);
			border: 1px solid var(--border);
			margin-bottom: 20px;
		}

		/* inputs */
		input,
		textarea,
		select {
			width: 100%;
			padding: 12px;
			border-radius: 12px;
			border: 1px solid var(--border);
			background: #020617;
			color: #fff;
			margin-top: 10px;
		}

		input:focus,
		textarea:focus,
		select:focus {
			outline: none;
			border-color: var(--primary);
		}

		/* buttons */
		.btn {
			padding: 12px 18px;
			border-radius: 12px;
			border: none;
			cursor: pointer;
			display: inline-flex;
			align-items: center;
			gap: 6px;
		}

		.btn-main {
			background: linear-gradient(135deg, var(--primary), var(--secondary))
		}

		.btn-success {
			background: #22c55e
		}

		.btn-back {
			background: rgba(255, 255, 255, 0.1)
		}

		.btn:hover {
			transform: scale(1.05)
		}

		/* toast */
		.toast {
			position: fixed;
			top: 20px;
			right: 20px;
			background: #020617;
			padding: 14px 18px;
			border-radius: 12px;
			border: 1px solid var(--border);
			display: none;
		}

		/* loader */
		.loader {
			display: none;
			text-align: center;
			margin-top: 10px;
		}
	</style>
</head>

<body>

	<div class="container">

		<!-- HEADER -->
		<div class="header">
			<a th:href="@{/manage-internships}" class="btn btn-back">⬅ Back</a>
			<h2 th:text="${internship.title} + ' Test Builder'"></h2>
			<form th:action="@{/admin-internship-test/confirm}" method="post">
				<input type="hidden" name="internshipId" th:value="${internship.id}">
				<button class="btn btn-success">✅ Confirm Test</button>
			</form>

		</div>
		<div th:if="${error}" class="toast" style="display:block;border-color:#ef4444;" th:text="${error}"></div>
		<div th:if="${msg}" class="toast" style="display:block;border-color:#22c55e;" th:text="${msg}"></div>
		<div class="grid">

			<!-- LEFT SIDE -->
			<div>

				<!-- TEST SETTINGS -->
				<div class="card">
					<h3><i class="bi bi-gear"></i> Test Settings</h3>

					<form method="post" th:action="@{/admin-internship-test/update}">

						<input type="hidden" name="internshipId" th:value="${internship.id}">

						<label>Duration (minutes)</label>
						<input type="number" name="duration" th:value="${test.durationMinutes}">

						<label>Passing Percentage (%)</label>
						<input type="number" name="passingMarks" th:value="${test.passingMarks}" min="1" max="100">

						<label>Questions to Show</label>
						<input type="number" name="totalQuestions" th:value="${test.totalQuestionsToShow}">

						<br><br>
						<button class="btn btn-main">Update Settings</button>
					</form>
				</div>

				<!-- ADD QUESTION -->
				<div class="card">
					<h3><i class="bi bi-plus-circle"></i> Add Question</h3>

					<form th:action="@{/admin-internship-test/add-question}" method="post">

						<input type="hidden" name="internshipId" th:value="${internship.id}">

						<textarea name="questionText" placeholder="Enter question"></textarea>

						<select name="format" onchange="toggleFields(this)">
							<option value="MCQ">MCQ</option>
							<option value="TEXT">Text</option>
							<option value="CODE">Code</option>
						</select>

						<div class="mcq">
							<input name="optionA" placeholder="Option A">
							<input name="optionB" placeholder="Option B">
							<input name="optionC" placeholder="Option C">
							<input name="optionD" placeholder="Option D">

							<select name="correctOption">
								<option value="">Correct Option</option>
								<option>A</option>
								<option>B</option>
								<option>C</option>
								<option>D</option>
							</select>
						</div>

						<br>
						<button class="btn btn-main">Add Question</button>

					</form>
				</div>

				<div class="card">
					<h3><i class="bi bi-lightning"></i> Bulk Question Generator</h3>

					<label>Total Questions</label>
					<input type="number" id="totalQ">

					<label>MCQ Count</label>
					<input type="number" id="mcq">

					<label>Code Count</label>
					<input type="number" id="code">

					<label>Text Count</label>
					<input type="number" id="text">

					<br><br>

					<button class="btn btn-main" type="button" onclick="generate()">
						<i class="bi bi-lightning-charge"></i> Generate Questions
					</button>

					<div class="loader" id="loader">
						⏳ Generating questions... Please wait (10s)
					</div>

					<div class="toast" id="toast"></div>
					<form method="post" action="/admin-internship-test/bulk-save">
						<input type="hidden" name="internshipId" th:value="${internship.id}">

						<div id="bulkContainer"></div>

						<br>
						<button class="btn btn-success" type="button" onclick="validateBulkSave()">
							<i class="bi bi-save"></i> Save All Questions
						</button>
					</form>
				</div>
			</div>

			<!-- RIGHT SIDE -->
			<div>

				<!-- STATS -->
				<div class="card">
					<h3>📊 Test Overview</h3>
					<p>Total Questions: <b th:text="${#lists.size(questions)}"></b></p>
					<p>Student will see: <b th:text="${test.totalQuestionsToShow}"></b></p>
				</div>

				<!-- QUESTIONS -->
				<div class="card">
					<h3>📋 Questions</h3>

					<div th:each="q : ${questions}" class="question-item">

						<p th:text="${q.questionText}"></p>

						<span class="badge" th:classappend="
                            ${q.questionFormat.name() == 'MCQ'} ? 'badge-mcq' :
                            (${q.questionFormat.name() == 'TEXT'} ? 'badge-text' : 'badge-code')
                          " th:text="${q.questionFormat}">
						</span>

						<br><br>

						<a th:href="@{'/admin-internship-test/delete?questionId=' + ${q.questionId} + '&internshipId=' + ${internship.id}}"
							class="btn btn-back">
							Delete
						</a>

					</div>

				</div>

			</div>

		</div>

	</div>

	<script>

		// save scroll before submit
		document.querySelectorAll("form").forEach(f => {
			f.addEventListener("submit", () => {
				localStorage.setItem("scrollY", window.scrollY);
			});
		});

		// restore scroll
		window.onload = () => {
			let y = localStorage.getItem("scrollY");
			if (y) {
				window.scrollTo(0, y);
				localStorage.removeItem("scrollY");
			}
		}
		function toggleFields(select) {
			let mcq = document.querySelector(".mcq");
			mcq.style.display = (select.value === "MCQ") ? "block" : "none";
		}


		function showToast(msg, type = "success") {
			let toast = document.getElementById("toast");
			toast.innerText = msg;
			toast.style.display = "block";
			toast.style.borderColor = type === "error" ? "#ef4444" : "#22c55e";

			setTimeout(() => toast.style.display = "none", 3000);
		}

		function generate() {

			let total = +document.getElementById("totalQ").value;
			let mcq = +document.getElementById("mcq").value || 0;
			let code = +document.getElementById("code").value || 0;
			let text = +document.getElementById("text").value || 0;

			// ❌ VALIDATION
			if (!total || total <= 0) {
				showToast("Enter total questions ❌", "error");
				return;
			}

			if (mcq + code + text !== total) {
				showToast("MCQ + Code + Text must equal Total ❌", "error");
				return;
			}

			if (mcq > total) {
				showToast("MCQ cannot exceed total ❌", "error");
				return;
			}

			// 🔥 LOADER
			document.getElementById("loader").style.display = "block";

			setTimeout(() => {
				createQuestions(mcq, code, text);
				document.getElementById("loader").style.display = "none";
				showToast("Questions generated successfully 🚀");
			}, 10000); // 10 sec
		}

		function createQuestions(mcq, code, text) {

			let container = document.getElementById("bulkContainer");
			container.innerHTML = "";
			let index = 0;

			function create(type) {
				return `
        <div class="question-item">
            <h4>Q${index + 1} (${type})</h4>

            <textarea name="questionText" placeholder="Enter question"></textarea>
            <input type="hidden" name="format" value="${type}">

            ${type === "MCQ" ? `
                <input name="optionA" placeholder="Option A">
                <input name="optionB" placeholder="Option B">
                <input name="optionC" placeholder="Option C">
                <input name="optionD" placeholder="Option D">

                <select name="correctOption">
                    <option value="">Correct Option</option>
                    <option>A</option><option>B</option><option>C</option><option>D</option>
                </select>
            `: ''}
        </div>`;
			}

			for (let i = 0; i < mcq; i++, index++) container.innerHTML += create("MCQ");
			for (let i = 0; i < code; i++, index++) container.innerHTML += create("CODE");
			for (let i = 0; i < text; i++, index++) container.innerHTML += create("TEXT");
		}

		function validateBulkSave() {

			let container = document.getElementById("bulkContainer");

			// ❌ no generated questions
			if (container.children.length === 0) {
				showToast("⚠️ Please generate questions before saving", "error");
				return;
			}

			// ❌ check empty question text
			let empty = false;

			container.querySelectorAll("textarea[name='questionText']").forEach(t => {
				if (!t.value.trim()) {
					empty = true;
				}
			});

			if (empty) {
				showToast("⚠️ Please fill all generated questions", "error");
				return;
			}

			// ✅ submit form manually
			container.closest("form").submit();
		}
	</script>
</body>

</html>
