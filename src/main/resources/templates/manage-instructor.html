<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Manage Instructor</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
	<link th:href="@{/css/admin-css/admin_sidebar.css}" rel="stylesheet">
	<style>
		.home-section .table {
			--bs-table-bg: transparent;
			--bs-table-striped-bg: rgba(255, 255, 255, 0.025);
			--bs-table-hover-bg: rgba(59, 130, 246, 0.08);
			--bs-table-color: #d1d5db;
			--bs-table-border-color: rgba(255, 255, 255, 0.08);
		}

		.home-section .table> :not(caption)>*>* {
			background-color: transparent !important;
		}

		.home-section .table {
			margin-top: 1.5rem;
			border-collapse: separate;
			border-spacing: 0;
			background: rgba(255, 255, 255, 0.03);
			color: #eaeaf0;
			border-radius: 0.75rem;
			overflow: hidden;
		}

		.home-section .table thead {
			background: rgba(255, 255, 255, 0.06);
		}

		.home-section .table thead th {
			color: #eaeaf0;
			font-weight: 600;
			font-size: 0.9rem;
			border-bottom: 1px solid rgba(255, 255, 255, 0.12);
			text-align: center;
		}

		.home-section .table tbody td {
			color: #d1d5db;
			font-size: 0.88rem;
			vertical-align: middle;
			border-top: 1px solid rgba(255, 255, 255, 0.08);
			text-align: center;
		}

		.home-section .table-striped>tbody>tr:nth-of-type(odd) {
			background-color: rgba(255, 255, 255, 0.025);
		}

		.home-section .table tbody tr:hover {
			background-color: rgba(59, 130, 246, 0.08);
			transition: background 0.2s ease;
		}

		.home-section .table-bordered {
			border: 1px solid rgba(255, 255, 255, 0.12);
		}

		.home-section .table-bordered th,
		.home-section .table-bordered td {
			border: 1px solid rgba(255, 255, 255, 0.08);
		}

		.home-section .btn-danger {
			background: rgba(239, 68, 68, 0.85);
			border: none;
			font-size: 0.75rem;
			padding: 0.3rem 0.6rem;
			border-radius: 0.4rem;
		}

		.home-section .btn-danger:hover {
			background: rgb(239, 68, 68);
		}

		@media (max-width: 768px) {
			.home-section .table {
				font-size: 0.8rem;
			}
		}


		.home-section .action-group {
			display: flex;
			justify-content: center;
			gap: 10px;
		}

		.home-section .btn-feedback {
			background: rgba(59, 130, 246, 0.15);
			color: #93c5fd;
			border: 1px solid rgba(59, 130, 246, 0.4);
			font-size: 0.75rem;
			padding: 0.35rem 0.65rem;
			border-radius: 0.45rem;
			display: inline-flex;
			align-items: center;
			gap: 6px;
			transition: all 0.2s ease;
		}

		.home-section .btn-feedback:hover {
			background: rgba(59, 130, 246, 0.25);
			color: #e0f2fe;
			transform: translateY(-1px);
		}

		.home-section .btn-delete {
			background: rgba(239, 68, 68, 0.15);
			color: #fca5a5;
			border: 1px solid rgba(239, 68, 68, 0.4);
			font-size: 0.75rem;
			padding: 0.35rem 0.65rem;
			border-radius: 0.45rem;
			transition: all 0.2s ease;
		}

		.home-section .btn-delete:hover {
			background: rgba(239, 68, 68, 0.25);
			color: #fee2e2;
			transform: translateY(-1px);
		}



		.status-select {
			background: rgba(255, 255, 255, 0.06);
			color: #e5e7eb;
			border: 1px solid rgba(255, 255, 255, 0.15);
			border-radius: 6px;
			font-size: 0.8rem;
			padding: 4px 8px;
			outline: none;
		}

		.status-select option {
			background: #0f172a;
			color: #e5e7eb;
		}

		.status-select:focus {
			border-color: rgba(59, 130, 246, 0.6);
			box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
		}

		.status-select {
			min-width: 110px;
		}

		.home-section .btn-feedback {
			background: rgba(59, 130, 246, 0.15);
			color: #93c5fd;
			border: 1px solid rgba(59, 130, 246, 0.4);
			font-size: 0.75rem;
			padding: 0.35rem 0.65rem;
			border-radius: 0.45rem;
			display: inline-flex;
			align-items: center;
			gap: 6px;
			transition: all 0.2s ease;
			text-decoration: none;

		}

		.home-section .btn-feedback:hover {
			background: rgba(59, 130, 246, 0.25);
			color: #e0f2fe;
			transform: translateY(-1px);
			text-decoration: none;

		}

		.table-controls {
			display: flex;
			gap: 12px;
			margin-bottom: 15px;
			align-items: center;
		}

		.search-box {
			display: flex;
			align-items: center;
			gap: 6px;
			background: rgba(255, 255, 255, 0.05);
			padding: 8px 12px;
			border-radius: 10px;
			border: 1px solid rgba(255, 255, 255, 0.08);
		}

		.search-box input {
			background: transparent;
			border: none;
			outline: none;
			color: #e5e7eb;
			font-size: 13px;
			width: 200px;
		}

		.filter-select {
			background: rgba(255, 255, 255, 0.06);
			color: #e5e7eb;
			border: 1px solid rgba(255, 255, 255, 0.15);
			border-radius: 6px;
			font-size: 0.8rem;
			padding: 4px 8px;
			outline: none;
		}

		.status-alert {
			background: rgba(34, 197, 94, 0.15);
			color: #4ade80;
			padding: 10px 15px;
			border-radius: 10px;
			margin-bottom: 15px;
			font-size: 13px;
			display: flex;
			align-items: center;
			gap: 8px;
			border: 1px solid rgba(34, 197, 94, 0.3);
		}

		.highlight-row {
			background: rgba(156, 163, 175, 0.15) !important;
			animation: fadeHighlight 2s ease;
		}

		@keyframes fadeHighlight {
			from {
				background: rgba(99, 102, 241, 0.4);
			}

			to {
				background: rgba(156, 163, 175, 0.15);
			}
		}
	</style>
</head>

<body>
	<div class="layout">

		<!-- ===== SIDEBAR ===== -->
		<aside class="vertical-sidebar">
			<input type="checkbox" id="sidebar-toggle" class="checkbox-input" checked>
			<nav>
				<header>
					<div class="sidebar__toggle-container">
						<label for="sidebar-toggle" class="nav__toggle" tabindex="0">
							<span class="toggle--icons">
								<i class="bi bi-list toggle--open"></i><i class="bi bi-x-lg toggle--close"></i>
							</span>
						</label>
					</div>
					<figure>
						<img class="codepen-logo" th:src="@{/images/admin-avatar.png}" alt="Admin">
						<figcaption>
							<p class="user-id" th:text="${username}">Admin</p>
							<p class="user-role">Administrator</p>
						</figcaption>
					</figure>
				</header>

				<section class="sidebar__wrapper">
					<ul class="sidebar__list">
						<li class="sidebar__item item--heading">
							<h2 class="sidebar__item--heading">General</h2>
						</li>
						<li class="sidebar__item"><a th:href="@{/admin-dashboard}">
								<i class="bi bi-speedometer2"></i><span>Dashboard</span></a></li>
						<li class="sidebar__item"><a th:href="@{/manage-students}">
								<i class="bi bi-people"></i><span>Student Management</span></a></li>
						<li class="sidebar__item"><a th:href="@{/manage-teachers}" class="active">
								<i class="bi bi-person-badge"></i><span>Instructor Management</span></a></li>
						<li class="sidebar__item"><a th:href="@{/manage-courses}">
								<i class="bi bi-book"></i><span>Course Management</span></a></li>
						<li class="sidebar__item"><a th:href="@{/manage-internships}">
								<i class="bi bi-kanban"></i><span>Internship Management</span></a></li>
						<li class="sidebar__item"><a th:href="@{/admin-post-internships}">
								<i class="bi bi-plus-circle"></i><span>Post Internships </span></a></li>
						<li class="sidebar__item"><a th:href="@{/admin-chat}">
								<i class="bi bi-chat-dots"></i><span>Chat System</span></a></li>
						<li class="sidebar__item"><a th:href="@{/admin-announcement}">
								<i class="bi bi-briefcase"></i><span>Announcements</span></a></li>
						<li class="sidebar__item"><a th:href="@{/admin-design}"><i
									class="bi bi-layout-text-window"></i><span>Certificate Design</span></a></li>
						<li class="sidebar__item"><a th:href="@{/admin-logout}">
								<i class="bi bi-box-arrow-right"></i><span>Logout</span></a></li>

					</ul>
				</section>
			</nav>
		</aside>

		<div class="content-area">
			<header class="topbar">
				<span class="page-title"> Instructor Management</span>
				<div class="topbar-right">
					<button class="profile-btn dropdown-toggle" data-bs-toggle="dropdown">
						<img th:src="@{/images/admin-avatar.png}" alt="Admin" class="avatar">
						<span th:text="${username}">Admin</span>
					</button>
				</div>
			</header>

			<main class="home-section">

				<div class="table-controls">

					<div class="search-box">
						<i class="bi bi-search"></i>
						<input type="text" id="searchInput" placeholder="Search instructors...">
					</div>

					<select id="statusFilter" class="status-select">
						<option value="ALL">All Status</option>
						<option value="ACTIVE">Active</option>
						<option value="SUSPENDED">Suspended</option>
						<option value="BLOCKED">Blocked</option>
					</select>

				</div>
				<div th:if="${statusMessage}" class="status-alert">
					<i class="bi bi-check-circle-fill"></i>
					<span th:text="${statusMessage}"></span>
				</div>
				<table class="table table-bordered table-striped mt-3">
					<thead>
						<tr>
							<th>Full Name</th>
							<th>Phone No</th>
							<th>Email</th>
							<th>Status</th>
							<th>Actions</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="teacher : ${teachers}" th:id="'row-' + ${teacher.teacherId}"
							th:classappend="${highlightId == teacher.teacherId} ? 'highlight-row'">
							<td th:text="${teacher.firstname + ' ' + teacher.lastname}"></td>
							<td th:text="${teacher.phoneno}"></td>
							<td th:text="${teacher.email}"></td>
							<td>

								<form th:action="@{/manage-instructor/status/{id}(id=${teacher.teacherId})}"
									method="post" class="d-flex gap-1 align-items-center">

									<select name="status" class="status-select">

										<option value="ACTIVE" th:selected="${teacher.status.name() == 'ACTIVE'}">
											Active
										</option>

										<option value="SUSPENDED" th:selected="${teacher.status.name() == 'SUSPENDED'}">
											Suspended
										</option>

										<option value="BLOCKED" th:selected="${teacher.status.name() == 'BLOCKED'}">
											Blocked
										</option>

									</select>
									<button class="btn btn-success btn-sm">
										<i class="bi bi-check"></i>
									</button>
								</form>
							</td>
							<td>
								<div class="action-group">

									<a class="btn-feedback"
										th:href="@{/admin-instructor-view/{id}(id=${teacher.teacherId})}">
										<i class="bi bi-chat-dots-fill"></i>
										View
									</a>
								</div>
							</td>
						</tr>
					</tbody>
				</table>
			</main>
		</div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script>
		window.onload = function () {
			let id = "[[${highlightId}]]";
			if (id) {
				let el = document.getElementById("row-" + id);
				if (el) {
					el.scrollIntoView({ behavior: "smooth", block: "center" });
				}
			}
		}
	</script>
</body>

</html>
