<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Test Results</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        :root {
            --bg-primary: linear-gradient(135deg, #0b0b1f, #14142f);
            --bg-card: rgba(255, 255, 255, 0.05);
            --accent: #6366f1;
            --accent-2: #8b5cf6;
            --text-light: #e5e7eb;
            --text-muted: #9ca3af;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            background: linear-gradient(135deg, #070718, #0f0f2a);
            font-family: 'Poppins', sans-serif;
            color: #f1f5f9;
            /* brighter text */
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 25px;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header h2 {
            font-size: 20px;
            font-weight: 600;
        }

        /* ===== HEADER BUTTONS ===== */
        .header-actions {
            display: flex;
            gap: 10px;
        }

        /* BASE BUTTON */
        .btn-header {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            transition: 0.25s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px) scale(1.03);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .btn-outline:hover {
            background: var(--accent);
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.25s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.25);
        }

        .left h3 {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .left p {
            font-size: 13px;
            color: #cbd5f1;
            /* brighter muted */
        }

        .status {
            display: inline-block;
            margin-top: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 500;
        }

        .status-pass {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
        }

        .status-fail {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            padding: 7px 12px;
            border-radius: 10px;
            font-size: 12px;
            border: none;
            cursor: pointer;
            display: inline-flex;
            gap: 5px;
            align-items: center;
        }

        .btn-check {
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
        }

        .btn-success {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .btn-action:hover {
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px dashed rgba(255, 255, 255, 0.08);
        }

        .empty-state i {
            font-size: 40px;
            color: var(--accent);
        }

        .empty-state h3 {
            margin-top: 15px;
            font-size: 18px;
            color: #c7d2fe;
        }

        .empty-state p {
            font-size: 13px;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.3px;
            color: #eaeaf0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header h2 i {
            font-size: 18px;
            color: #6366f1;
        }

        .btn-view {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #ffffff !important;
            font-weight: 500;
            border: none;
        }

        .btn-view i,
        .btn-view span {
            color: #ffffff !important;
        }

        .btn-view:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        a {
            text-decoration: none;
        }

        .card {
            display: grid;
            grid-template-columns: 2fr 1fr auto;
            align-items: center;
            gap: 20px;

            padding: 18px 22px;
        }

        .col-left h3 {
            margin: 0;
        }

        .col-left p {
            margin: 3px 0 0;
        }

        .col-status {
            text-align: center;
        }

        .col-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .card,
        .card * {
            color: #f1f5f9 !important;
        }

        .card p {
            color: #cbd5f1 !important;
        }

        .status-pass {
            color: #4ade80 !important;
        }

        .status-fail {
            color: #f87171 !important;
        }

        .btn-action,
        .btn-action * {
            color: #ffffff !important;
        }

        h2,
        h3 {
            color: #ffffff !important;
        }

        /* ===== HEADER RESPONSIVE ===== */
        @media (max-width: 768px) {

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .header-actions {
                width: 100%;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .btn-header {
                width: 100%;
                justify-content: center;
            }
        }

        /* ===== CARD MOBILE ===== */
        @media (max-width: 768px) {

            .card {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                padding: 16px;
            }

            .col-left {
                width: 100%;
            }

            .col-status {
                width: 100%;
                text-align: left;
            }

            .col-actions {
                width: 100%;
                flex-direction: column;
                gap: 8px;
            }
        }

        /* ===== BUTTON FULL WIDTH ===== */
        @media (max-width: 768px) {

            .btn-action {
                width: 100%;
                justify-content: center;
            }

            .col-actions form {
                width: 100%;
            }

            .col-actions form button {
                width: 100%;
            }
        }

        /* ===== SMALL MOBILE ===== */
        @media (max-width: 576px) {

            .container {
                padding: 20px 12px;
            }

            .card {
                border-radius: 14px;
            }

            .col-left h3 {
                font-size: 15px;
            }

            .col-left p {
                font-size: 13px;
            }

            .status {
                font-size: 11px;
            }

            body {
                overflow-x: hidden;
            }
        }

        /* subtle glow */
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(99, 102, 241, 0.35);
        }
    </style>

</head>

<body>

    <div class="container">
        <div class="header">
            <h2>
                <i class="bi bi-clipboard-data"></i>

                Test Results

                <span th:if="${internship != null}">
                    - <span th:text="${internship.title}"></span>
                </span>

                <span th:if="${internship == null}" style="color:#9ca3af;">
                    - No Internship Selected
                </span>
            </h2>
            <div class="header-actions">
                <a th:href="@{/admin-applicants(id=${internshipId})}" class="btn-header btn-outline">
                    <i class="bi bi-people"></i> Applicants
                </a>
                <a th:href="@{'/admin-final-selection?internshipId=' + ${internshipId}}" class="btn-header btn-primary">
                    <i class="bi bi-bullseye"></i> Final Selection
                </a>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(attempts)}" class="empty-state">
            <i class="bi bi-clipboard-x"></i>
            <h3>No Test Attempts Yet</h3>
            <p>
                Students haven’t taken the test yet.<br>
                Once they complete it, results will appear here.
            </p>
        </div>
        <div th:each="a : ${attempts}" class="card" th:if="${a.student != null}">

            <div class="col-left">
                <h3 th:text="${a.student.fullname}"></h3>
                <p>
                    Score: <b th:text="${a.score}"></b> |
                    <span th:text="${a.percentage} + '%'"></span>
                </p>
            </div>

            <div class="col-status">
                <span th:if="${a.passed}" class="status status-pass">PASSED</span>
                <span th:if="${!a.passed}" class="status status-fail">FAILED</span>
            </div>

            <div class="col-actions">

                <a th:href="@{'/admin-evaluate-test?attemptId=' + ${a.id}}" class="btn-action btn-view">
                    <i class="bi bi-eye"></i>
                    <span>Check</span>
                </a>

                <form action="/admin/select-student" method="post" th:if="${a.passed}">
                    <input type="hidden" name="studentId" th:value="${a.student.studid}">
                    <input type="hidden" name="internshipId" th:value="${internshipId}">

                    <button class="btn-action btn-success">
                        <i class="bi bi-person-check"></i> <span> Select </span>
                    </button>
                </form>

                <form th:action="@{/admin/allow-reattempt}" method="post" th:if="${!a.passed}">
                    <input type="hidden" name="studentId" th:value="${a.student.studid}">
                    <input type="hidden" name="internshipId" th:value="${internshipId}">

                    <button class="btn-action btn-danger">
                        <i class="bi bi-arrow-repeat"></i> <span> Re-attempt</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
