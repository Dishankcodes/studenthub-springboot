<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Notification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: #f4f7ff;
        }

        .main {
            margin-left: 240px;
            margin-top: 56px;
            padding: 20px;
            transition: margin-left 0.3s ease;
        }
    </style>
</head>

<body>
    <div class="main">

    <!-- 🔔 INCOMING -->
    <h3 style="margin-bottom:15px;">📥 Incoming Requests</h3>

    <div th:if="${receivedRequests == null or #lists.isEmpty(receivedRequests)}"
         style="text-align:center; opacity:0.6;">
        No incoming requests
    </div>

    <div th:each="req : ${receivedRequests}"
         style="background:#fff; padding:12px; border-radius:10px; margin-bottom:10px; display:flex; align-items:center; gap:12px;">

        <img th:src="${req.sender.profileImage != null ? req.sender.profileImage : '/images/default.jpg'}"
             style="width:45px; height:45px; border-radius:50%;">

        <div style="flex:1;">
            <div style="font-weight:600;" th:text="${req.sender.name}"></div>
            <div style="font-size:12px; color:gray;">
                wants to connect with you
            </div>
        </div>

        <!-- ACCEPT -->
        <form action="/connection/accept" method="post">
            <input type="hidden" name="id" th:value="${req.id}">
            <button class="btn btn-success btn-sm">Accept</button>
        </form>

        <!-- REJECT -->
        <form action="/connection/reject" method="post">
            <input type="hidden" name="id" th:value="${req.id}">
            <button class="btn btn-danger btn-sm">Reject</button>
        </form>

    </div>

    <!-- 📤 SENT -->
    <h3 style="margin:25px 0 15px;">📤 Sent Requests</h3>

    <div th:if="${sentRequests == null or #lists.isEmpty(sentRequests)}"
         style="text-align:center; opacity:0.6;">
        No sent requests
    </div>

    <div th:each="req : ${sentRequests}"
         style="background:#fff; padding:12px; border-radius:10px; margin-bottom:10px; display:flex; align-items:center; gap:12px;">

        <img th:src="${req.receiver.profileImage != null ? req.receiver.profileImage : '/images/default.jpg'}"
             style="width:45px; height:45px; border-radius:50%;">

        <div style="flex:1;">
            <div style="font-weight:600;" th:text="${req.receiver.name}"></div>
            <div style="font-size:12px; color:#f59e0b;">
                Request Sent
            </div>
        </div>

        <!-- CANCEL -->
        <form action="/connection/cancel" method="post">
            <input type="hidden" name="id" th:value="${req.id}">
            <button class="btn btn-secondary btn-sm">Cancel</button>
        </form>

    </div>

</div>
</body>

</html>
