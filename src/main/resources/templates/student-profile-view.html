<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Student Profile</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

	<style>
		body {
			background: #f4f7ff;
			font-family: 'Poppins', sans-serif;
		}

		/* MAIN */
		.main {
			margin-left: 240px;
			margin-top: 60px;
			padding: 20px;
		}

		/* CARD */
		.profile-card {
			background: white;
			border-radius: 18px;
			padding: 30px;
			max-width: 900px;
			margin: auto;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
		}

		/* TOP BAR */
		.top-actions {
			display: flex;
			justify-content: space-between;
			margin-bottom: 20px;
		}

		/* HEADER */
		.profile-header {
			display: flex;
			align-items: center;
			gap: 20px;
			border-bottom: 1px solid #eee;
			padding-bottom: 20px;
		}

		.profile-header img {
			width: 110px;
			height: 110px;
			border-radius: 50%;
			object-fit: cover;
		}

		/* INFO */
		.profile-info {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
			gap: 15px;
			margin-top: 20px;
		}

		.info-box {
			background: #f8faff;
			padding: 15px;
			border-radius: 12px;
			border: 1px solid #e5e7eb;
		}

		.info-box span {
			font-size: 12px;
			color: #6b7280;
		}

		.info-box strong {
			display: block;
			margin-top: 5px;
		}

		/* BUTTONS */
		.btn {
			padding: 8px 14px;
			border-radius: 10px;
			border: none;
			cursor: pointer;
			font-size: 13px;
			display: inline-flex;
			gap: 6px;
			align-items: center;
		}

		.btn-back {
			background: #e5e7eb;
		}

		.btn-connect {
			background: #6d28d9;
			color: white;
		}

		.btn-chat {
			background: #10b981;
			color: white;
		}

		.status {
			font-size: 13px;
		}

		.pending {
			color: #f59e0b;
		}
	</style>

</head>

<body>

	<div class="main">

		<div class="profile-card">

			<!-- TOP -->
			<div class="top-actions">

				<a th:href="@{/student-search}" class="btn btn-back">
					<i class="bi bi-arrow-left"></i> Back
				</a>

				<div>

					<form th:if="${status == 'FOLLOW'}" action="/connection/send" method="post">
						<input type="hidden" name="receiverId" th:value="${chatUser.id}">
						<button class="btn btn-connect">
							<i class="bi bi-person-plus"></i> Connect
						</button>
					</form>

					<span th:if="${status == 'PENDING'}" class="status pending">
						Request Sent ✓
					</span>

					<a th:if="${status == 'CHAT'}" th:href="@{/student-chat(userId=${chatUser.id})}"
						class="btn btn-chat">
						<i class="bi bi-chat"></i> Chat
					</a>

				</div>

			</div>

			<!-- HEADER -->
			<div class="profile-header">

				<img th:src="${student.profileImage != null ? student.profileImage : '/images/default.jpg'}">

				<div>
					<h3 th:text="${student.fullname}"></h3>
					<p th:text="${student.college}"></p>
				</div>

			</div>

			<!-- INFO -->
			<div class="profile-info">

				<div class="info-box">
					<span>Degree</span>
					<strong th:text="${student.degree}"></strong>
				</div>

				<div class="info-box">
					<span>Email</span>
					<strong th:text="${student.email}"></strong>
				</div>

				<div class="info-box">
					<span>Interests</span>
					<strong th:text="${student.interests}"></strong>
				</div>

				<div class="info-box">
					<span>Joined</span>
					<strong th:text="${#temporals.format(student.joinedOn,'dd MMM yyyy')}"></strong>
				</div>

			</div>

		</div>

	</div>

</body>

</html>
