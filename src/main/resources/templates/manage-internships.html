<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Your Sidebar CSS -->
    <link th:href="@{/css/admin-css/admin_sidebar.css}" rel="stylesheet">

    <style>
        .internship-list-container {
            max-width: 1100px;
            margin: auto;
        }

        /* HEADER */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header-row h1 {
            font-weight: 600;
        }

        /* CREATE BUTTON */
        .btn-create {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            padding: 10px 18px;
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.25s;
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        /* CARD */
        .internship-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(14px);
            border-radius: 18px;
            padding: 20px 22px;
            margin-bottom: 18px;

            display: flex;
            justify-content: space-between;
            align-items: center;

            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.25s;
        }

        .internship-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(99, 102, 241, 0.25);
        }

        /* LEFT */
        .left h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }

        .left .meta {
            font-size: 13px;
            opacity: 0.7;
        }

        .left .tag {
            margin-top: 6px;
            font-size: 12px;
            background: rgba(99, 102, 241, 0.15);
            padding: 4px 10px;
            border-radius: 8px;
            display: inline-block;
        }

        /* RIGHT ACTIONS */
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* BUTTON STYLE */
        .btn-action {
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s;
        }

        /* VARIANTS */
        .btn-primary-custom {
            background: #0ea5e9;
            color: white;
        }

        .btn-primary-custom:hover {
            background: #0284c7;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }

        .btn-gradient:hover {
            transform: scale(1.05);
        }

        .btn-danger-custom {
            background: #ef4444;
            color: white;
        }

        .btn-danger-custom:hover {
            background: #dc2626;
        }

        /* ALERT IMPROVE */
        .alert {
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* FILTER BAR */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* INPUT GROUP */
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }

        .filter-group i {
            opacity: 0.7;
        }

        .filter-group input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            width: 180px;
            font-size: 14px;
        }

        /* BUTTON */
        .btn-filter {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            padding: 10px 16px;
            border-radius: 12px;
            color: white;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .btn-filter:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="layout">

        <!-- ===== SIDEBAR ===== -->
        <aside class="vertical-sidebar">
            <input type="checkbox" id="sidebar-toggle" class="checkbox-input" checked>
            <nav>
                <header>
                    <div class="sidebar__toggle-container">
                        <label for="sidebar-toggle" class="nav__toggle" tabindex="0">
                            <span class="toggle--icons">
                                <i class="bi bi-list toggle--open"></i><i class="bi bi-x-lg toggle--close"></i>
                            </span>
                        </label>
                    </div>
                    <figure>
                        <img class="codepen-logo" th:src="@{/images/admin-avatar.png}" alt="Admin">
                        <figcaption>
                            <p class="user-id" th:text="${username}">Admin</p>
                            <p class="user-role">Administrator</p>
                        </figcaption>
                    </figure>
                </header>

                <section class="sidebar__wrapper">
                    <ul class="sidebar__list">
                        <li class="sidebar__item item--heading">
                            <h2 class="sidebar__item--heading">General</h2>
                        </li>

                        <li class="sidebar__item"><a th:href="@{/admin-dashboard}">
                                <i class="bi bi-speedometer2"></i><span>Dashboard</span></a></li>
                        <li class="sidebar__item"><a th:href="@{/manage-students}">
                                <i class="bi bi-people"></i><span>Student Management</span></a></li>
                        <li class="sidebar__item"><a th:href="@{/manage-teachers}">
                                <i class="bi bi-person-badge"></i><span>Instructor Management</span></a></li>
                        <li class="sidebar__item"><a th:href="@{/manage-courses}">
                                <i class="bi bi-book"></i><span>Course Management</span></a></li>
                        <li class="sidebar__item"><a th:href="@{/manage-internships}" class="active">
                                <i class="bi bi-kanban"></i><span>Internship Management</span></a></li>
                        <li class="sidebar__item"><a th:href="@{/admin-post-internships}">
                                <i class="bi bi-plus-circle"></i><span>Post Internships </span></a></li>
                        <li class="sidebar__item"><a th:href="@{/admin-chat}">
                                <i class="bi bi-chat-dots"></i><span>Chat System</span></a></li>
                        <li class="sidebar__item"><a th:href="@{/admin-announcement}">
                                <i class="bi bi-briefcase"></i><span>Announcements</span></a></li>
                        <li class="sidebar__item"><a th:href="@{/admin-design}"><i
                                    class="bi bi-layout-text-window"></i><span>Certificate Design</span></a></li>
                        <li class="sidebar__item"><a th:href="@{/admin-logout}">
                                <i class="bi bi-box-arrow-right"></i><span>Logout</span></a></li>

                    </ul>
                </section>
            </nav>
        </aside>

       <div class="content-area">
            <header class="topbar">
                <span class="page-title"></span>
                <div class="topbar-right">
                    <button class="profile-btn dropdown-toggle" data-bs-toggle="dropdown">
                        <img th:src="@{/images/admin-avatar.png}" alt="Admin" class="avatar">
                        <span th:text="${username}">Admin</span>
                    </button>
                </div>
            </header>

            <main class="home-section">
                <div class="internship-list-container">

                    <div class="header-row">
                        <h1>Internship Management</h1>

                        <a href="/admin-post-internships" class="btn-create">
                            <i class="bi bi-plus-circle"> </i> Post Internship
                        </a>
                    </div>
                    <div th:if="${msg}" class="alert alert-success">
                        <i class="bi bi-check-circle"></i>
                        <span th:text="${msg}"></span>
                    </div>

                    <div th:if="${error}" class="alert alert-danger">
                        <i class="bi bi-x-circle"></i>
                        <span th:text="${error}"></span>
                    </div>
                </div>
                <div class="filter-bar">

                    <div class="filter-group">
                        <i class="bi bi-search"></i>
                        <input type="text" name="keyword" placeholder="Search internships..."
                            th:value="${param.keyword}">
                    </div>

                   <div class="filter-group">
                        <i class="bi bi-geo-alt"></i>
                        <input type="text" name="location" placeholder="Filter by location..."
                            th:value="${param.location}">
                    </div>

                    <button type="submit" class="btn-filter">
                        <i class="bi bi-funnel"></i>
                        Apply
                    </button>

                </div>
                <div class="internship-list">

                    <div th:each="i : ${internships}" class="internship-card">

                        <div class="left">
                            <h3 th:text="${i.title}"></h3>

                            <div class="meta">
                                <i class="bi bi-geo-alt"></i>
                                <span th:text="${i.location}"></span>
                            </div>

                            <div class="tag">
                                <i class="bi bi-book"></i>
                                <span
                                    th:text="${i.requiredCourse != null ? i.requiredCourse.title : 'No course required'}"></span>
                            </div>
                        </div>

                        <div class="actions">
                            <a th:href="@{'/admin-applicants?id=' + ${i.id}}" class="btn-action btn-primary-custom">
                                <i class="bi bi-people"></i>
                                Applicants
                            </a>

                            <form th:action="@{/admin/toggle-test}" method="post">
                                <input type="hidden" name="internshipId" th:value="${i.id}">
                                <input type="hidden" name="confirmRemove" value="true">
                                <button class="btn-action btn-gradient">
                                    <span th:if="${i.hasTest}">
                                        <i class="bi bi-x-circle"></i> Remove Test
                                    </span>
                                    <span th:if="${!i.hasTest}">
                                        <i class="bi bi-plus-circle"></i> Add Test
                                    </span>
                                </button>
                            </form>

                            <a th:if="${i.hasTest}" th:href="@{'/admin-internship-test?internshipId=' + ${i.id}}"
                                class="btn-action btn-gradient">
                                <i class="bi bi-ui-checks-grid"></i>
                                Manage Test
                            </a>
                            <a th:href="@{'/admin-final-selection?internshipId=' + ${i.id}}"
                                class="btn-action btn-primary-custom">
                                <i class="bi bi-trophy"></i>
                                Final Selection
                            </a>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>



    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
