<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Insert title here</title>
    <style>
        :root {
            --expanded: 16.875rem;
            --collapsed: 3.25rem;
            --bg-primary: linear-gradient(135deg, #0b0b1f, #14142f);
            --bg-content: #1a1a3d;
            --accent: #6366f1;
            --text-light: #eaeaf0;
            --text-muted: #9ca3af;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        /* PAGE */
        body {
            background: var(--bg-primary);
            color: var(--text-light);
            font-family: 'Poppins', sans-serif;
        }

        /* CONTAINER */
        .applicants-container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        /* TITLE */
        h1 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* CARD */
        .applicant-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(14px);
            border-radius: 18px;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.25s ease;
        }

        .applicant-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.25);
        }

        /* LEFT */
        .info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .info img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        /* NAME */
        .info h3 {
            margin-bottom: 4px;
        }

        /* TEXT */
        .info p {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* STATUS BADGE */
        .status {
            display: inline-block;
            margin-top: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 500;
        }

        .status.pending {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .status.accepted {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
        }

        .status.rejected {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        /* ACTIONS */
        .actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* BUTTON BASE */
        .btn {
            border: none;
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        /* BUTTON VARIANTS */
        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-light);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-info {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-success {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        /* HOVER EFFECT */
        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        /* NO RESUME TEXT */
        .actions span {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* HEADER */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* HOME BUTTON */
        .btn-home {
            background: rgba(255, 255, 255, 0.08);
            padding: 8px 14px;
            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            font-size: 13px;
        }

        .btn-home:hover {
            background: #6366f1;
        }

        /* CREATE TEST BUTTON */
        .btn-test-header {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            padding: 10px 18px;
            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            font-weight: 500;
        }

        .btn-test-header:hover {
            transform: scale(1.05);
        }

        /* ACTION FORM */
        .action-form {
            display: flex;
            gap: 6px;
        }

        /* FINAL STATUS */
        .final {
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 999px;
        }

        .final.accepted {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .final.rejected {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        /* FLASH MESSAGE */
        .flash {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .flash.success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .flash.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        /* NO RESUME */
        .no-resume {
            font-size: 12px;
            color: #aaa;
        }

        .flash i {
            margin-right: 6px;
        }

        .status i {
            margin-right: 5px;
        }

        .btn i {
            margin-right: 5px;
        }

        /* STATUS COLORS IMPROVE */
        .status {
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        /* FINAL TAG */
        .final {
            font-weight: 600;
        }

        /* EMPTY STATE */
        .flash {
            text-align: center;
            background: rgba(99, 102, 241, 0.1);
            color: #c7d2fe;
        }

        /* BUTTON SPACING */
        .actions {
            gap: 10px;
        }

        /* HOVER BOOST */
        .applicant-card:hover {
            transform: translateY(-5px) scale(1.01);
        }
    </style>
</head>

<body>
    <main class="home-section">

        <div class="applicants-container">

            <div class="header-row">

                <div class="header-left">
                    <a href="/manage-internships" class="btn-home">⬅ Back</a>
                    <h3 th:if="${internship != null}" th:text="${internship.title}"></h3>

                    <h3 th:if="${internship == null}">
                        Internship not available
                    </h3>
                </div>

                <div style="display:flex; gap:10px;">


                    <!-- CREATE / MANAGE TEST -->
                    <a th:href="@{'/admin-internship-test?internshipId=' + ${internship.id}}" class="btn-test-header">
                        🧪 Manage Test
                    </a>

                    <!-- RESULTS -->
                    <a th:if="${internship.hasTest}" th:href="@{'/admin-test-results?internshipId=' + ${internship.id}}"
                        class="btn-test-header">
                        📊 Test Results
                    </a>

                    <!-- FINAL -->
                    <a th:href="@{'/admin-final-selection?internshipId=' + ${internship.id}}" class="btn-test-header">
                        🎯 Final Selection
                    </a>

                </div>
            </div>

            <div th:if="${#lists.isEmpty(applications)}" class="alert alert-info">
                No applicants yet 🚀
            </div>
            <div th:if="${msg}" class="flash success">
                <i class="bi bi-check-circle"></i>
                <span th:text="${msg}"></span>
            </div>

            <div th:if="${error}" class="flash error">
                <i class="bi bi-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>
            <div class="filter-bar" style="margin-bottom:15px; display:flex; gap:10px; flex-wrap:wrap;">

                <!-- SEARCH -->
                <input type="text" id="searchInput" placeholder="Search student..."
                    style="padding:8px; border-radius:8px; border:none; width:200px;">

                <!-- STATUS FILTER -->
                <select id="statusFilter" style="padding:8px; border-radius:8px;">
                    <option value="ALL">All</option>
                    <option value="APPLIED">Student Applied</option>
                    <option value="ACCEPTED">Student Accepted</option>
                    <option value="REJECTED">Student Rejected</option>
                </select>

                <!-- TEST FILTER -->
                <select id="testFilter" style="padding:8px; border-radius:8px;">
                    <option value="ALL">All</option>
                    <option value="GIVEN">Test Given</option>
                    <option value="NOT_GIVEN">Not Given</option>
                </select>

            </div>
            <div class="applicant-list">

                <div class="applicant-card" th:each="app : ${applications}" th:attr="
        data-name=${app.student.fullname},
        data-status=${app.status},
        data-test=${app.status.name() == 'PASSED' ? 'GIVEN' : 'NOT_GIVEN'}">
                    <!-- LEFT -->
                    <div class="info">

                        <img th:src="${app.student.profileImage != null 
                        ? app.student.profileImage 
                        : '/images/default.jpg'}">

                        <div>
                            <h3 th:text="${app.student.fullname}"></h3>

                            <p>
                                Skills:
                                <span th:text="${app.student.interests}"></span>
                            </p>

                            <!-- STATUS -->
                           <span class="status"
      th:classappend="${app.status.name() == 'APPLIED' ? ' pending' : 
                (app.status.name() == 'ACCEPTED' ? ' accepted' : 
                (app.status.name() == 'REJECTED' ? ' rejected' : 
                (app.status.name() == 'SELECTED' ? ' accepted' : '')))}">
      

                                <i class="bi" th:classappend="${app.status.name() == 'APPLIED' ? 'bi-hourglass-split' : 
                (app.status.name() == 'ACCEPTED' ? 'bi-check-circle' : 
                (app.status.name() == 'REJECTED' ? 'bi-x-circle' : 
                (app.status.name() == 'SELECTED' ? 'bi-person-check' : '')))}">
                                </i>

                                <span th:text="${app.status}"></span>
                            </span>
                        </div>
                    </div>

                    <!-- RIGHT -->
                    <div class="actions">

                        <a th:href="@{'/admin-view-student?id=' + ${app.student.studid} + '&internshipId=' + ${internship.id}}"
                            class="btn btn-secondary">
                            👤 Profile
                        </a>

                        <a th:if="${app.resumeUrl != null}" th:href="${app.resumeUrl}" target="_blank"
                            class="btn btn-info">
                            👁 View
                        </a>

                        <a th:if="${app.resumeUrl != null}" th:href="${app.resumeUrl}" download class="btn btn-primary">
                            ⬇ Download
                        </a>

                        <span th:if="${app.resumeUrl == null}" class="no-resume">
                            No Resume
                        </span>

                        <!-- ACCEPT / REJECT -->
                        <form th:if="${app.status.name() == 'APPLIED'}" th:action="@{/admin/application/update}"
                            method="post" class="action-form">

                            <input type="hidden" name="appId" th:value="${app.id}">
                            <input type="hidden" name="internshipId" th:value="${internship.id}">

                            <button name="action" value="accept" class="btn btn-success">
                                <i class="bi bi-check-lg"></i> Accept
                            </button>

                            <button name="action" value="reject" class="btn btn-danger">
                                <i class="bi bi-x-lg"></i> Reject
                            </button>
                        </form>

                        <!-- FINAL STATUS -->
                        <span th:if="${app.status.name() == 'ACCEPTED'}" class="final accepted">
                            <i class="bi bi-check-lg"></i> Accepted
                        </span>

                        <span th:if="${app.status.name() == 'REJECTED'}" class="final rejected">
                            <i class="bi bi-x-circle"></i> Rejected
                        </span>
                        <form action="/admin/select-student" method="post">
                            <input type="hidden" name="studentId" th:value="${app.student.studid}">
                            <input type="hidden" name="internshipId" th:value="${internship.id}">

                            <button name="action" value="select" class="btn btn-primary">
                                <i class="bi bi-person-check"></i> Select
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
