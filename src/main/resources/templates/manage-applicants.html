<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Manage Application | EduPlatform</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link th:href="@{/css/admin-css/admin_sidebar.css}" rel="stylesheet">
<!-- <link href="admin-sidebar.css" rel="stylesheet"> -->
<style>
    :root {
        --expanded: 16.875rem;
        --collapsed: 3.25rem;
        --bg-primary: linear-gradient(135deg, #0b0b1f, #14142f);
        --bg-content: #1a1a3d;
        --accent: #6366f1;
        --text-light: #eaeaf0;
        --text-muted: #9ca3af;
        --success: #22c55e;
        --danger: #ef4444;
        --warning: #f59e0b;
    }

    /* PAGE */
    body {
        background: var(--bg-primary);
        color: var(--text-light);
        font-family: 'Poppins', sans-serif;
    }

    /* CONTAINER */
    .applicants-container {
        max-width: 1100px;
        margin: auto;
        padding: 20px;
    }

    /* TITLE */
    h1 {
        margin-bottom: 20px;
        font-weight: 600;
    }

    .applicant-card {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 15px;
    }

    .applicant-card:hover {
        transform: translateY(-4px);
        border-color: var(--accent);
        box-shadow: 0 10px 30px rgba(99, 102, 241, 0.25);
    }

    /* LEFT */
    .info {
        display: flex;
        gap: 15px;
        align-items: center;
    }

    .info img {
        width: 55px;
        height: 55px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid rgba(255, 255, 255, 0.2);
    }

    /* NAME */
    .info h3 {
        margin-bottom: 4px;
    }

    /* TEXT */
    .info p {
        font-size: 13px;
        color: var(--text-muted);
    }

    /* STATUS BADGE */
    .status {
        display: inline-block;
        margin-top: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 500;
    }

    .status.pending {
        background: rgba(245, 158, 11, 0.2);
        color: var(--warning);
    }

    .status.accepted {
        background: rgba(34, 197, 94, 0.2);
        color: var(--success);
    }

    .status.rejected {
        background: rgba(239, 68, 68, 0.2);
        color: var(--danger);
    }

    /* ACTIONS */
    .actions {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
    }

    /* BUTTON BASE */
    .btn {
        border: none;
        padding: 6px 12px;
        border-radius: 10px;
        font-size: 12px;
        cursor: pointer;
        transition: 0.2s ease;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 5px;
    }

    /* BUTTON VARIANTS */
    .btn-secondary {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text-light);
    }

    .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.15);
    }

    .btn-info {
        background: rgba(59, 130, 246, 0.2);
        color: #60a5fa;
    }

    .btn-primary {
        background: var(--accent);
        color: #fff;
    }

    .btn-success {
        background: rgba(34, 197, 94, 0.2);
        color: var(--success);
    }

    .btn-danger {
        background: rgba(239, 68, 68, 0.2);
        color: var(--danger);
    }

    /* HOVER EFFECT */
    .btn:hover {
        transform: translateY(-2px);
        opacity: 0.9;
    }

    /* NO RESUME TEXT */
    .actions span {
        font-size: 12px;
        color: var(--text-muted);
    }

    /* HEADER */
    .header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    /* HOME BUTTON */
    .btn-home {
        background: rgba(255, 255, 255, 0.08);
        padding: 8px 14px;
        border-radius: 10px;
        color: #fff;
        text-decoration: none;
        font-size: 13px;
    }

    .btn-home:hover {
        background: #6366f1;
    }

    /* CREATE TEST BUTTON */
    .btn-test-header {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        padding: 10px 18px;
        border-radius: 10px;
        color: #fff;
        text-decoration: none;
        font-weight: 500;
    }

    .btn-test-header:hover {
        transform: scale(1.05);
    }

    /* ACTION FORM */
    .action-form {
        display: flex;
        gap: 6px;
    }

    /* FINAL STATUS */
    .final {
        font-size: 12px;
        padding: 5px 10px;
        border-radius: 999px;
    }

    .final.accepted {
        background: rgba(34, 197, 94, 0.2);
        color: #22c55e;
    }

    .final.rejected {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
    }

    /* FLASH MESSAGE */
    .flash {
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 15px;
        font-size: 14px;
    }

    .flash.success {
        background: rgba(34, 197, 94, 0.2);
        color: #22c55e;
    }

    .flash.error {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
    }

    /* NO RESUME */
    .no-resume {
        font-size: 12px;
        color: #aaa;
    }

    .flash i {
        margin-right: 6px;
    }

    .status i {
        margin-right: 5px;
    }

    .btn i {
        margin-right: 5px;
    }

    /* STATUS COLORS IMPROVE */
    .status {
        font-weight: 600;
        letter-spacing: 0.3px;
    }

    /* FINAL TAG */
    .final {
        font-weight: 600;
    }

    /* EMPTY STATE */
    .flash {
        text-align: center;
        background: rgba(99, 102, 241, 0.1);
        color: #c7d2fe;
    }

    /* BUTTON SPACING */
    .actions {
        gap: 10px;
    }

    /* HOVER BOOST */
    .applicant-card:hover {
        transform: translateY(-5px) scale(1.01);
    }

    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }

    .page-header h2 {
        font-size: 22px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .sub-text {
        color: #9ca3af;
        font-size: 13px;
        margin-top: 4px;
    }

    .header-actions {
        display: flex;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 12px;
    }

    .filter-bar {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
        align-items: center;
    }

    .search-box {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.05);
        padding: 8px 12px;
        border-radius: 10px;
        gap: 6px;
    }

    .search-box input {
        background: transparent;
        border: none;
        color: white;
        outline: none;
    }

    .filter-bar select {
        background: rgba(255, 255, 255, 0.05);
        border: none;
        color: white;
        padding: 8px 10px;
        border-radius: 10px;
    }

    .btn-primary {
        background: #6366f1;
        color: white;
    }

    .btn-outline {
        background: rgba(255, 255, 255, 0.05);
        color: white;
    }

    .btn-success {
        background: rgba(34, 197, 94, 0.2);
        color: #22c55e;
    }

    .empty-state {
        text-align: center;
        padding: 40px;
        color: #9ca3af;
    }

    
        .status-select {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #e5e7eb;
            font-size: 0.75rem;
            padding: 0.35rem 0.5rem;
            border-radius: 0.45rem;
            backdrop-filter: blur(6px);
            min-width: 110px;
        }

        .status-select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
        }

        .status-select option {
            background: #0f172a;
            color: #e5e7eb;
        }

    .table-view {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 12px;
        overflow: hidden;
        font-size: 13px;
    }

    .table-view thead {
        background: rgba(255, 255, 255, 0.06);
    }

    .table-view th {
        padding: 12px;
        text-align: left;
        color: #9ca3af;
        font-weight: 500;
    }

    .table-view td {
        padding: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        color: #e5e7eb;
    }

    .table-view tr:hover {
        background: rgba(99, 102, 241, 0.08);
    }

    /* ACTION GROUP */
    .action-group {
        display: flex;
        gap: 6px;
    }

    /* SMALL BUTTON */
    .btn-sm {
        padding: 5px 8px;
        font-size: 11px;
    }

    .badge {
        background: rgba(99, 102, 241, 0.2);
        color: #c7d2fe;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 11px;
    }

    .table-controls {
        display: flex;
        gap: 12px;
        margin-bottom: 15px;
        align-items: center;
    }

    .header-actions a {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        padding: 10px 14px;
        border-radius: 10px;
    }

    .header-actions a {
        text-decoration: none !important;
        border: none !important;
    }

    /* OPTIONAL: MATCH BUTTON COLOR */
    .btn-primary::after {
        background: #6366f1;
    }

    .btn-success::after {
        background: #22c55e;
    }

    .page-title {
        font-size: 18px;
        font-weight: 600;
        line-height: 1.3;
    }

    .sub-text {
        display: block;
        font-size: 13px;
        color: #9ca3af;
        font-weight: 400;
        margin-top: 2px;
    }
</style>
</head>

<body>
    <main class="home-section">
        <header class="topbar">
            <span class="page-title">
                <i class="bi bi-people"></i> Manage Applicants <br>
                <span class="sub-text" th:text="${internship.title}"></span>
            </span>

            <div class="header-actions">

                <a href="/manage-internships" class="btn-outline">
                    <i class="bi bi-arrow-left"></i> Back
                </a>
                <a th:href="@{'/admin-internship-test?internshipId=' + ${internship.id}}" class="btn-primary">
                    <i class="bi bi-ui-checks"></i> Manage Test
                </a>
                <a th:if="${internship.hasTest}" th:href="@{'/admin-test-results?internshipId=' + ${internship.id}}"
                    class="btn-outline">
                    <i class="bi bi-bar-chart"></i> Results
                </a>

                <a th:href="@{'/admin-final-selection?internshipId=' + ${internship.id}}" class="btn-success">
                    <i class="bi bi-person-check"></i> Final Selection
                </a>

            </div>

            <div class="topbar-right">
                <button class="profile-btn dropdown-toggle" data-bs-toggle="dropdown">
                    <img th:src="@{/images/admin-avatar.png}" class="avatar">
                    <span th:text="${username}">Admin</span>
                </button>
            </div>
        </header>
        <div class="applicants-container">

            <div th:if="${#lists.isEmpty(applications)}" class="empty-state">
                No applicants yet <i class="bi bi-inbox"></i>
            </div>
            <div th:if="${msg}" class="flash success">
                <i class="bi bi-check-circle"></i>
                <span th:text="${msg}"></span>
            </div>

            <div th:if="${error}" class="flash error">
                <i class="bi bi-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>
            <div class="table-controls">

                <div class="search-box">
                    <i class="bi bi-search"></i>
                    <input type="text" id="searchInput" placeholder="Search applicants...">
                </div>

                <select id="statusFilter" class="status-select">
                    <option value="ALL">All Status</option>
                    <option value="APPLIED">Applied</option>
                    <option value="ACCEPTED">Accepted</option>
                    <option value="REJECTED">Rejected</option>
                </select>

                <select id="testFilter" class="status-select">
                    <option value="ALL">All Test</option>
                    <option value="GIVEN">Given</option>
                    <option value="NOT_GIVEN">Not Given</option>
                </select>

            </div>
            <table class="table-view">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Student</th>
                        <th>Skills</th>
                        <th>Status</th>
                        <th>Resume</th>
                        <th>Actions</th>
                        <th>Direct Selection</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="app, stat : ${applications}" th:attr="
                data-name=${app.student.fullname},
                data-status=${app.status}">

                        <td th:text="${stat.index + 1}"></td>
                        <td>
                            <div style="display:flex;align-items:center;gap:10px;">
                                <img th:src="${app.student.profileImage != null 
                        ? app.student.profileImage 
                        : '/images/default.jpg'}" style="width:35px;height:35px;border-radius:50%;">
                                <span th:text="${app.student.fullname}"></span>
                            </div>
                        </td>

                        <td>
                            <span th:if="${app.student.interests != null and !#strings.isEmpty(app.student.interests)}"
                                th:text="${app.student.interests}"></span>

                            <span th:if="${app.student.interests == null or #strings.isEmpty(app.student.interests)}"
                                class="no-resume">
                                No Skills Added
                            </span>
                        </td>
                        <td>
                            <span class="status" th:classappend="${app.status.name() == 'APPLIED' ? ' pending' : 
    (app.status.name() == 'ACCEPTED' ? ' accepted' : 
    (app.status.name() == 'REJECTED' ? ' rejected' : 
    (app.status.name() == 'SELECTED' ? ' selected' : '')))}">
                                <span th:text="${app.status}"></span>
                            </span>
                        </td>
                        <td>
                            <a th:if="${app.resumeUrl != null}" th:href="${app.resumeUrl}" target="_blank"
                                class="btn btn-info btn-sm">
                                <i class="bi bi-eye"></i> Resume
                            </a>

                            <span th:if="${app.resumeUrl == null}" class="no-resume">
                                — No Resume
                            </span>
                        </td>

                        <td>
                            <div class="action-group">
                                <a th:href="@{'/admin-view-student?id=' + ${app.student.studid} + '&internshipId=' + ${internship.id}}"
                                    class="btn btn-secondary btn-sm">
                                    <i class="bi bi-person"></i> See Profile
                                </a>

                                <form th:if="${app.status.name() == 'APPLIED'}" th:action="@{/admin/application/update}"
                                    method="post">
                                    <input type="hidden" name="appId" th:value="${app.id}">
                                    <input type="hidden" name="internshipId" th:value="${internship.id}">

                                    <button name="action" value="accept" class="btn btn-success btn-sm">
                                        <i class="bi bi-check"></i> Accept
                                    </button>

                                    <button name="action" value="reject" class="btn btn-danger btn-sm">
                                        <i class="bi bi-x"></i> Reject
                                    </button>
                                </form>
                            </div>
                        </td>

                        <td>
                            <div class="action-group">
                                <!-- SELECT -->
                                <form action="/admin/select-student" method="post">
                                    <input type="hidden" name="studentId" th:value="${app.student.studid}">
                                    <input type="hidden" name="internshipId" th:value="${internship.id}">

                                    <button class="btn btn-primary btn-sm">
                                        <i class="bi bi-person-check"></i> Select
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>

</html>
