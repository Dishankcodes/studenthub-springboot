<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Manage Application | EduPlatform</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<!-- <link href="admin-sidebar.css" rel="stylesheet"> -->
<style>
    /* ================= ROOT ================= */
    :root {
        --bg-primary: linear-gradient(135deg, #0b0b1f, #14142f);
        --bg-content: #1a1a3d;
        --accent: #6366f1;
        --text-light: #eaeaf0;
        --text-muted: #9ca3af;
        --success: #22c55e;
        --danger: #ef4444;
        --warning: #f59e0b;
    }

    /* ================= GLOBAL FIX ================= */
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        background: var(--bg-primary);
        color: var(--text-light);
        font-family: 'Poppins', sans-serif;
        overflow-x: hidden;
    }

    /* 👉 THIS GIVES YOU 130% FEEL */
    html {
        font-size: 112%;
        /* like zoom 125–130% */
    }

    /* ================= MAIN ================= */
    .home-section {
        width: 100%;
        padding: 30px 40px;
    }

    /* ================= HEADER ================= */
    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 25px;
    }

    .page-title {
        font-size: 1.2rem;
        font-weight: 600;
    }

    .sub-text {
        display: block;
        font-size: 0.8rem;
        color: var(--text-muted);
    }

    /* BUTTON GROUP */
    .header-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    /* BUTTON */
    .header-actions a {
        padding: 10px 16px;
        border-radius: 10px;
        font-size: 0.85rem;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        text-decoration: none;
        white-space: nowrap;
    }

    /* COLORS */
    .btn-outline {
        background: rgba(255, 255, 255, 0.08);
        color: white;
    }

    .btn-primary {
        background: var(--accent);
        color: white;
    }

    .btn-success {
        background: rgba(34, 197, 94, 0.2);
        color: var(--success);
    }

    /* ================= CONTAINER ================= */
    .applicants-container {
        max-width: 1200px;
        margin: auto;
    }

    /* ================= FILTER ================= */
    .table-controls {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
        align-items: center;
        flex-wrap: wrap;
    }

    .search-box {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.05);
        padding: 10px 14px;
        border-radius: 10px;
        gap: 6px;
        flex: 1;
    }

    .search-box input {
        background: transparent;
        border: none;
        color: white;
        outline: none;
        width: 100%;
    }

    /* SELECT */
    .status-select {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #e5e7eb;
        padding: 8px 12px;
        border-radius: 10px;
    }

    /* ================= TABLE ================= */
    .table-view {
        width: 100%;
        border-collapse: collapse;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 14px;
        overflow: hidden;
    }

    .table-view th {
        padding: 14px;
        text-align: left;
        color: var(--text-muted);
        font-weight: 500;
        font-size: 0.85rem;
    }

    .table-view td {
        padding: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 0.85rem;
    }

    .table-view tr:hover {
        background: rgba(99, 102, 241, 0.08);
    }

    /* ================= STATUS ================= */
    .status {
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
    }

    .status.pending {
        background: rgba(245, 158, 11, 0.2);
        color: var(--warning);
    }

    .status.accepted {
        background: rgba(34, 197, 94, 0.2);
        color: var(--success);
    }

    .status.rejected {
        background: rgba(239, 68, 68, 0.2);
        color: var(--danger);
    }

    /* ================= BUTTONS ================= */
    .btn {
        border: none;
        padding: 8px 14px;
        border-radius: 10px;
        font-size: 0.8rem;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 5px;
    }

    .btn-secondary {
        background: rgba(255, 255, 255, 0.08);
        color: white;
    }

    .btn-info {
        background: rgba(59, 130, 246, 0.2);
        color: #60a5fa;
    }

    .btn-success {
        background: rgba(34, 197, 94, 0.2);
        color: var(--success);
    }

    .btn-danger {
        background: rgba(239, 68, 68, 0.2);
        color: var(--danger);
    }

    .btn-primary {
        background: var(--accent);
        color: white;
    }

    .btn:hover {
        transform: translateY(-2px);
    }

    /* ================= ACTION GROUP ================= */
    .action-group {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
    }

    /* ================= EMPTY ================= */
    .empty-state {
        text-align: center;
        padding: 40px;
        color: var(--text-muted);
    }

    /* ================= MOBILE ================= */
    @media (max-width: 768px) {

        .home-section {
            padding: 20px;
        }

        .topbar {
            flex-direction: column;
            align-items: flex-start;
        }

        .header-actions {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .header-actions a {
            width: 100%;
            justify-content: center;
        }

        .header-actions a:last-child {
            grid-column: span 2;
        }

        .table-controls {
            flex-direction: column;
            align-items: stretch;
        }

        .status-select {
            width: 100%;
        }

        .table-view {
            overflow-x: auto;
        }
    }

    /* ================= EXTRA SMALL ================= */
    @media (max-width: 576px) {

        html {
            font-size: 105%;
        }

        .page-title {
            font-size: 1rem;
        }

        .sub-text {
            font-size: 0.75rem;
        }
    }

    /* ===== PREMIUM SEARCH ===== */
    .search-box {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 12px 16px;
        border-radius: 14px;
        backdrop-filter: blur(12px);
        transition: 0.3s;
    }

    .search-box:hover {
        border-color: rgba(99, 102, 241, 0.4);
    }

    .search-box:focus-within {
        border-color: #6366f1;
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
    }

    .search-box i {
        color: #9ca3af;
        font-size: 14px;
    }

    .search-box input {
        background: transparent;
        border: none;
        outline: none;
        color: white;
        font-size: 14px;
    }

    .search-box input::placeholder {
        color: #9ca3af;
    }

    /* ===== PREMIUM SELECT ===== */
    .status-select {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #e5e7eb;
        padding: 10px 14px;
        border-radius: 12px;
        backdrop-filter: blur(10px);
        transition: 0.3s;
        cursor: pointer;
    }

    .status-select:hover {
        border-color: rgba(99, 102, 241, 0.4);
    }

    .status-select:focus {
        border-color: #6366f1;
        box-shadow: 0 0 12px rgba(99, 102, 241, 0.3);
        outline: none;
    }

    /* dropdown options */
    .status-select option {
        background: #0f172a;
        color: white;
    }

    /* ===== REMOVE LINK UNDERLINE ===== */
    a {
        text-decoration: none !important;
    }

    .btn {
        text-decoration: none !important;
    }

    .btn {
        transition: all 0.25s ease;
    }

    .btn:hover {
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 6px 18px rgba(99, 102, 241, 0.25);
    }

    /* ===== MOBILE TABLE CARDS ===== */
    @media (max-width: 576px) {

        .table-view thead {
            display: none;
        }

        .table-view tbody tr {
            display: block;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .table-view td {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border: none;
        }

        .table-view td::before {
            content: attr(data-label);
            font-weight: 600;
            color: #9ca3af;
        }

        .action-group {
            flex-direction: column;
            width: 100%;
        }

        .btn {
            width: 100%;
            justify-content: center;
        }
    }

    /* ================= FIX RIGHT SIDE OVERFLOW ================= */
    .table-view,
    .table-view * {
        max-width: 100%;
    }

    /* Prevent content overflow */
    .table-view td {
        flex-wrap: wrap;
        word-break: break-word;
    }

    /* Fix row container */
    @media (max-width: 576px) {

        .table-view tbody tr {
            width: 100%;
            box-sizing: border-box;
        }

        /* Prevent horizontal scroll */
        .table-view {
            overflow-x: hidden;
        }

        /* Fix flex spacing */
        .table-view td {
            gap: 10px;
            align-items: flex-start;
        }

        /* Fix long names/text */
        .table-view td span {
            max-width: 65%;
            word-break: break-word;
        }

        /* Fix buttons overflow */
        .action-group {
            width: 100%;
        }

        .btn {
            width: 100%;
            max-width: 100%;
        }
    }
    
</style>
</head>

<body>
    <main class="home-section">
        <header class="topbar">
            <span class="page-title">
                <i class="bi bi-people"></i> Manage Applicants <br>
                <span class="sub-text" th:text="${internship.title}"></span>
            </span>

            <div class="header-actions">

                <a href="/manage-internships" class="btn-outline">
                    <i class="bi bi-arrow-left"></i> Back
                </a>
                <a th:href="@{'/admin-internship-test?internshipId=' + ${internship.id}}" class="btn-primary">
                    <i class="bi bi-ui-checks"></i> Manage Test
                </a>
                <a th:if="${internship.hasTest}" th:href="@{'/admin-test-results?internshipId=' + ${internship.id}}"
                    class="btn-outline">
                    <i class="bi bi-bar-chart"></i> Results
                </a>

                <a th:href="@{'/admin-final-selection?internshipId=' + ${internship.id}}" class="btn-success">
                    <i class="bi bi-person-check"></i> Final Selection
                </a>

            </div>
        </header>
        <div class="applicants-container">

            <div th:if="${#lists.isEmpty(applications)}" class="empty-state">

                <i class="bi bi-inbox" style="font-size:28px;"></i>

                <p style="margin-top:10px;font-size:14px;">
                    No applications found
                </p>

                <p style="font-size:12px;color:#9ca3af;">
                    This student hasn’t applied to any internship yet.
                </p>

            </div>
            <div th:if="${msg}" class="flash success">
                <i class="bi bi-check-circle"></i>
                <span th:text="${msg}"></span>
            </div>

            <div th:if="${error}" class="flash error">
                <i class="bi bi-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>
            <div class="table-controls">

                <div class="search-box">
                    <i class="bi bi-search"></i>
                    <input type="text" id="searchInput" placeholder="Search applicants...">
                </div>

                <select id="statusFilter" class="status-select">
                    <option value="ALL">All Status</option>
                    <option value="APPLIED">Applied</option>
                    <option value="ACCEPTED">Accepted</option>
                    <option value="REJECTED">Rejected</option>
                </select>

                <select id="testFilter" class="status-select">
                    <option value="ALL">All Test</option>
                    <option value="GIVEN">Given</option>
                    <option value="NOT_GIVEN">Not Given</option>
                </select>

            </div>
            <table class="table-view">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Student</th>
                        <th>Skills</th>
                        <th>Status</th>
                        <th>Resume</th>
                        <th>Actions</th>
                        <th>Direct Selection</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="app, stat : ${applications}" th:attr="
                data-name=${app.student.fullname},
                data-status=${app.status}">

                        <td th:text="${stat.index + 1}"></td>
                        <td data-label="Student">
                            <div style="display:flex;align-items:center;gap:10px;">
                                <img th:src="${app.student.profileImage != null 
                        ? app.student.profileImage 
                        : '/images/default.jpg'}" style="width:35px;height:35px;border-radius:50%;">
                                <span th:text="${app.student.fullname}"></span>
                            </div>
                        </td>

                        <td data-label="Skills">
                            <span th:if="${app.student.interests != null and !#strings.isEmpty(app.student.interests)}"
                                th:text="${app.student.interests}"></span>

                            <span th:if="${app.student.interests == null or #strings.isEmpty(app.student.interests)}"
                                class="no-resume">
                                No Skills Added
                            </span>
                        </td>
                        <td data-label="Status">
                            <span class="status" th:classappend="${app.status.name() == 'APPLIED' ? ' pending' : 
    (app.status.name() == 'ACCEPTED' ? ' accepted' : 
    (app.status.name() == 'REJECTED' ? ' rejected' : 
    (app.status.name() == 'SELECTED' ? ' selected' : '')))}">
                                <span th:text="${app.status}"></span>
                            </span>
                        </td>
                        <td data-label="Resume">
                            <a th:if="${app.resumeUrl != null}" th:href="${app.resumeUrl}" target="_blank"
                                class="btn btn-info btn-sm">
                                <i class="bi bi-eye"></i> Resume
                            </a>

                            <span th:if="${app.resumeUrl == null}" class="no-resume">
                                — No Resume
                            </span>
                        </td>

                        <td data-label="Actions">
                            <div class="action-group">
                                <a th:href="@{'/admin-view-student?id=' + ${app.student.studid} + '&internshipId=' + ${internship.id}}"
                                    class="btn btn-secondary btn-sm">
                                    <i class="bi bi-person"></i> See Profile
                                </a>

                                <form th:if="${app.status.name() == 'APPLIED'}" th:action="@{/admin/application/update}"
                                    method="post">
                                    <input type="hidden" name="appId" th:value="${app.id}">
                                    <input type="hidden" name="internshipId" th:value="${internship.id}">

                                    <button name="action" value="accept" class="btn btn-success btn-sm">
                                        <i class="bi bi-check"></i> Accept
                                    </button>

                                    <button name="action" value="reject" class="btn btn-danger btn-sm">
                                        <i class="bi bi-x"></i> Reject
                                    </button>
                                </form>
                            </div>
                        </td>

                        <td data-label="Direct Selection">
                            <div class="action-group">
                                <!-- SELECT -->
                                <form action="/admin/select-student" method="post">
                                    <input type="hidden" name="studentId" th:value="${app.student.studid}">
                                    <input type="hidden" name="internshipId" th:value="${internship.id}">

                                    <button class="btn btn-primary btn-sm">
                                        <i class="bi bi-person-check"></i> Select
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>

</html>
